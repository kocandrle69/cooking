<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌿 Vegetariánské recepty</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
:root {
  --glass:       rgba(8, 3, 18, 0.52);
  --glass-md:    rgba(8, 3, 18, 0.64);
  --glass-lg:    rgba(8, 3, 18, 0.80);
  --border:      rgba(255,255,255,0.10);
  --border-lg:   rgba(255,255,255,0.17);
  --shine:       rgba(255,255,255,0.15);
  --blur-sm:     14px;
  --blur-md:     30px;
  --blur-lg:     52px;
  --r:           26px;
  --r-sm:        16px;
  --r-full:      100px;
  --accent:      #f4a261;
  --accent-dim:  rgba(244,162,97,0.20);
  --accent-glow: rgba(244,162,97,0.12);
  --text:        #f5f0ea;
  --muted:       rgba(245,240,234,0.54);
  --subtle:      rgba(245,240,234,0.30);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', -apple-system, sans-serif;
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  /*
   * FIXED PARALLAX BACKGROUND
   * The photo stays pinned to the viewport — content scrolls over it.
   * Put cooking-background.jpg in the SAME folder as index.html on GitHub.
   * The dark gradient overlay keeps text readable over the photo.
   */
  background-image:
    linear-gradient(rgba(4,1,12,.65) 0%, rgba(4,1,12,.50) 50%, rgba(4,1,12,.65) 100%),
    url("cooking-background.jpg");
  background-size: cover;
  background-position: center center;
  background-attachment: fixed;
  background-color: #080210;
}

/* soft edge vignette */
body::after {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background: radial-gradient(ellipse 120% 120% at 50% 50%,
    transparent 28%, rgba(4,1,12,.60) 100%);
}

.z1  { position: relative; z-index: 1; }
.wrap { max-width: 1200px; margin: 0 auto; padding: 0 28px; }

/* ── HEADER ─────────────────────────────────────────── */
header {
  position: sticky; top: 0; z-index: 100;
  backdrop-filter: blur(var(--blur-md)) saturate(180%);
  -webkit-backdrop-filter: blur(var(--blur-md)) saturate(180%);
  background: rgba(4,1,12,.68);
  border-bottom: 1px solid var(--border);
}
.header-inner {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 28px; max-width: 1200px; margin: 0 auto;
}
.logo { font-family:'Cormorant Garamond',serif; font-size:1.35rem; font-weight:500; letter-spacing:.01em; }
.logo .a { color: var(--accent); }

/* ── LANG TOGGLE ────────────────────────────────────── */
.lang-tog {
  display:flex; gap:3px;
  background:rgba(255,255,255,.05); border:1px solid var(--border);
  border-radius:var(--r-full); padding:4px;
}
.lang-tog button {
  background:none; border:none; color:var(--muted);
  font-family:'DM Sans',sans-serif; font-size:.82rem; font-weight:500;
  letter-spacing:.04em; padding:6px 14px; border-radius:var(--r-full);
  cursor:pointer; transition:background .2s,color .2s;
}
.lang-tog button.on { background:rgba(255,255,255,.13); color:var(--text); box-shadow:0 1px 6px rgba(0,0,0,.3); }

/* ── HERO ───────────────────────────────────────────── */
.hero { padding:96px 0 56px; text-align:center; }
.hero-badge {
  display:inline-block; font-size:.74rem; font-weight:500;
  letter-spacing:.14em; text-transform:uppercase; color:var(--accent);
  background:var(--accent-glow); border:1px solid var(--accent-dim);
  border-radius:var(--r-full); padding:5px 18px; margin-bottom:24px;
  backdrop-filter:blur(8px);
}
.hero h1 {
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(3rem,7vw,5.6rem); font-weight:300;
  line-height:1.07; margin-bottom:18px; letter-spacing:-.01em;
  text-shadow:0 2px 24px rgba(0,0,0,.55),0 1px 4px rgba(0,0,0,.4);
}
.hero h1 em { font-style:italic; color:var(--accent); }
.hero-sub {
  color:var(--muted); font-size:1.05rem; font-weight:300;
  margin-bottom:44px; text-shadow:0 1px 8px rgba(0,0,0,.5);
}

/* ── SEARCH ─────────────────────────────────────────── */
.search-wrap { max-width:580px; margin:0 auto; position:relative; }
.search-wrap input {
  width:100%; background:rgba(4,1,12,.55);
  backdrop-filter:blur(var(--blur-md)); -webkit-backdrop-filter:blur(var(--blur-md));
  border:1px solid var(--border-lg); border-radius:var(--r-full);
  padding:17px 56px 17px 26px; color:var(--text);
  font-family:'DM Sans',sans-serif; font-size:1rem; outline:none;
  transition:border-color .25s,box-shadow .25s,background .25s;
}
.search-wrap input::placeholder { color:var(--subtle); }
.search-wrap input:focus {
  border-color:var(--accent); background:rgba(4,1,12,.72);
  box-shadow:0 0 0 4px var(--accent-glow);
}
.si {
  position:absolute; right:22px; top:50%; transform:translateY(-50%);
  color:var(--subtle); font-size:1.2rem; pointer-events:none; transition:color .2s;
}
.search-wrap:focus-within .si { color:var(--accent); }
.cnt-badge {
  display:inline-flex; align-items:center; gap:6px;
  background:rgba(4,1,12,.45); backdrop-filter:blur(8px);
  border:1px solid var(--border); border-radius:var(--r-full);
  padding:4px 16px; font-size:.78rem; color:var(--muted); margin-top:12px;
}

/* ── FILTERS ────────────────────────────────────────── */
.filters { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; padding:32px 0 44px; }
.fb {
  background:rgba(4,1,12,.45); backdrop-filter:blur(var(--blur-sm));
  -webkit-backdrop-filter:blur(var(--blur-sm));
  border:1px solid var(--border); border-radius:var(--r-full);
  padding:9px 22px; color:var(--muted); font-family:'DM Sans',sans-serif;
  font-size:.88rem; cursor:pointer; transition:all .22s;
}
.fb:hover { background:rgba(4,1,12,.65); border-color:var(--border-lg); color:var(--text); }
.fb.on { background:rgba(244,162,97,.14); border-color:rgba(244,162,97,.38); color:var(--accent); }

/* ── GRID ───────────────────────────────────────────── */
.grid {
  display:grid; grid-template-columns:repeat(auto-fill,minmax(330px,1fr));
  gap:18px; padding-bottom:100px;
}

/* ── CARD ───────────────────────────────────────────── */
.card {
  background:var(--glass);
  backdrop-filter:blur(var(--blur-md)) saturate(160%);
  -webkit-backdrop-filter:blur(var(--blur-md)) saturate(160%);
  border:1px solid var(--border); border-radius:var(--r);
  padding:30px; cursor:pointer; position:relative; overflow:hidden;
  transition:transform .32s cubic-bezier(.34,1.56,.64,1),background .22s,border-color .22s,box-shadow .32s;
  animation:fadeUp .45s ease both;
}
.card::before {
  content:''; position:absolute; top:0; left:12%; right:12%; height:1px;
  background:linear-gradient(90deg,transparent,var(--shine) 40%,var(--shine) 60%,transparent);
}
.card::after {
  content:''; position:absolute; inset:0; border-radius:var(--r); opacity:0;
  background:radial-gradient(ellipse at 50% 0%,rgba(244,162,97,.07) 0%,transparent 65%);
  transition:opacity .3s;
}
.card:hover {
  transform:translateY(-6px) scale(1.010); background:var(--glass-md);
  border-color:rgba(255,255,255,.17);
  box-shadow:0 28px 70px rgba(0,0,0,.60),0 6px 20px rgba(0,0,0,.35),inset 0 1px 0 var(--shine);
}
.card:hover::after { opacity:1; }
.card-emoji { font-size:2.6rem; display:block; margin-bottom:18px; line-height:1; }
.card-cat   { font-size:.72rem; font-weight:500; letter-spacing:.12em; text-transform:uppercase; color:var(--accent); margin-bottom:8px; }
.card-name  { font-family:'Cormorant Garamond',serif; font-size:1.55rem; font-weight:500; line-height:1.22; margin-bottom:12px; }
.card-desc  { color:var(--muted); font-size:.88rem; font-weight:300; line-height:1.65; margin-bottom:22px; }
.card-meta  { display:flex; gap:18px; font-size:.78rem; color:var(--subtle); }

/* ── MODAL ──────────────────────────────────────────── */
.overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.72);
  backdrop-filter:blur(12px) saturate(130%); -webkit-backdrop-filter:blur(12px) saturate(130%);
  z-index:300; display:flex; align-items:center; justify-content:center;
  padding:20px; opacity:0; pointer-events:none; transition:opacity .3s;
}
.overlay.open { opacity:1; pointer-events:all; }
.modal {
  background:var(--glass-lg);
  backdrop-filter:blur(var(--blur-lg)) saturate(200%); -webkit-backdrop-filter:blur(var(--blur-lg)) saturate(200%);
  border:1px solid var(--border-lg); border-radius:32px;
  max-width:740px; width:100%; max-height:88vh; overflow-y:auto;
  transform:scale(.93) translateY(28px);
  transition:transform .36s cubic-bezier(.34,1.3,.64,1);
  box-shadow:0 40px 120px rgba(0,0,0,.65),inset 0 1px 0 rgba(255,255,255,.10);
}
.overlay.open .modal { transform:scale(1) translateY(0); }
.modal-hdr {
  padding:34px 34px 26px; border-bottom:1px solid var(--border);
  position:sticky; top:0; z-index:1;
  background:rgba(4,1,12,.94); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  border-radius:32px 32px 0 0;
}
.mclose {
  position:absolute; top:22px; right:22px;
  background:rgba(255,255,255,.07); border:1px solid var(--border);
  border-radius:50%; width:38px; height:38px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; color:var(--muted); font-size:.95rem; transition:background .2s,color .2s;
}
.mclose:hover { background:rgba(255,255,255,.13); color:var(--text); }
.m-emoji { font-size:2rem; display:block; margin-bottom:10px; line-height:1; }
.m-cat   { font-size:.72rem; font-weight:500; letter-spacing:.12em; text-transform:uppercase; color:var(--accent); margin-bottom:7px; }
.m-name  { font-family:'Cormorant Garamond',serif; font-size:2rem; font-weight:500; line-height:1.18; padding-right:48px; }
.m-desc  { color:var(--muted); font-size:.9rem; font-weight:300; margin-top:9px; line-height:1.62; }
.m-meta  { display:flex; gap:16px; margin-top:14px; font-size:.78rem; color:var(--subtle); }
.modal-body { padding:28px 34px 36px; }
.sec-ttl {
  font-family:'Cormorant Garamond',serif; font-size:1.15rem; font-weight:500;
  color:var(--accent); margin:28px 0 14px; padding-bottom:9px;
  border-bottom:1px solid var(--border); letter-spacing:.01em;
}
.sec-ttl:first-child { margin-top:0; }
.sub-lbl { font-size:.72rem; font-weight:500; text-transform:uppercase; letter-spacing:.10em; color:var(--subtle); margin:16px 0 8px; }
.ing-list { list-style:none; display:grid; gap:6px; }
.ing-list li {
  padding:9px 15px; background:rgba(255,255,255,.04); border:1px solid var(--border);
  border-radius:var(--r-sm); font-size:.88rem; font-weight:300;
  display:flex; align-items:center; gap:10px; transition:background .18s;
}
.ing-list li:hover { background:rgba(255,255,255,.07); }
.dot { width:5px; height:5px; background:var(--accent); border-radius:50%; flex-shrink:0; opacity:.7; }
.steps-list { list-style:none; display:grid; gap:12px; }
.steps-list li {
  padding:16px 20px; background:rgba(255,255,255,.04); border:1px solid var(--border);
  border-radius:18px; font-size:.88rem; font-weight:300; line-height:1.72;
  display:grid; grid-template-columns:32px 1fr; gap:14px; align-items:start;
  transition:background .18s;
}
.steps-list li:hover { background:rgba(255,255,255,.07); }
.sn {
  background:var(--accent-dim); color:var(--accent); border-radius:50%;
  width:28px; height:28px; display:flex; align-items:center; justify-content:center;
  font-size:.78rem; font-weight:500; flex-shrink:0; margin-top:1px;
  border:1px solid rgba(244,162,97,.25);
}
.tip-box {
  background:rgba(244,162,97,.05); border:1px solid rgba(244,162,97,.18);
  border-radius:18px; padding:16px 20px;
  font-size:.88rem; font-weight:300; line-height:1.72; color:var(--muted);
}
.modal::-webkit-scrollbar { width:4px; }
.modal::-webkit-scrollbar-thumb { background:rgba(255,255,255,.12); border-radius:4px; }

.empty { grid-column:1/-1; text-align:center; padding:80px 24px; color:var(--muted); }
.empty .icon { font-size:2.8rem; margin-bottom:14px; }

footer {
  position:relative; z-index:1; border-top:1px solid var(--border);
  padding:24px 28px; text-align:center; color:var(--subtle); font-size:.82rem;
  backdrop-filter:blur(var(--blur-md)); -webkit-backdrop-filter:blur(var(--blur-md));
  background:rgba(4,1,12,.58);
}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(22px); }
  to   { opacity:1; transform:translateY(0); }
}
.card:nth-child(1)  { animation-delay:.05s; }
.card:nth-child(2)  { animation-delay:.10s; }
.card:nth-child(3)  { animation-delay:.15s; }
.card:nth-child(4)  { animation-delay:.20s; }
.card:nth-child(5)  { animation-delay:.25s; }
.card:nth-child(6)  { animation-delay:.30s; }
.card:nth-child(n+7){ animation-delay:.34s; }

@media (max-width:640px) {
  .wrap { padding:0 16px; }
  .header-inner { padding:13px 16px; }
  .hero { padding:64px 0 36px; }
  .grid { grid-template-columns:1fr; }
  .modal { border-radius:24px; max-height:92vh; }
  .modal-hdr { padding:26px 22px 20px; border-radius:24px 24px 0 0; }
  .m-name { font-size:1.6rem; }
  .modal-body { padding:20px 20px 28px; }
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo z1" id="logo">🌿 <span class="a">Naše</span> recepty</div>
    <div class="lang-tog">
      <button id="btn-cs" class="on" onclick="setLang('cs')">CZ</button>
      <button id="btn-en" onclick="setLang('en')">EN</button>
    </div>
  </div>
</header>

<main class="wrap z1">
  <section class="hero">
    <div class="hero-badge" id="hero-badge">🥬 Ověřené recepty</div>
    <h1 id="hero-title"><em>Vegetariánské</em> recepty</h1>
    <p class="hero-sub" id="hero-sub">Naše oblíbená rodinná jídla z celého světa</p>
    <div class="search-wrap">
      <input type="text" id="search" placeholder="Hledat recept…" oninput="render()" autocomplete="off">
      <span class="si">⌕</span>
    </div>
    <div class="cnt-badge">
      <span id="cnt-n"></span>&thinsp;<span id="cnt-lbl">receptů</span>
    </div>
  </section>

  <div class="filters" id="filters">
    <button class="fb on" onclick="setF('all',this)">Vše</button>
    <button class="fb"    onclick="setF('indian',this)">🇮🇳 Indická</button>
    <button class="fb"    onclick="setF('european',this)">🇪🇺 Evropská</button>
    <button class="fb"    onclick="setF('dessert',this)">🍮 Dezerty</button>
  </div>

  <div class="grid" id="grid"></div>
</main>

<footer class="z1"><span id="footer-txt">Naše oblíbené vegetariánské recepty · Vždy dostupné</span></footer>

<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-hdr">
      <button class="mclose" onclick="closeM()">✕</button>
      <span class="m-emoji" id="m-emoji"></span>
      <div class="m-cat"  id="m-cat"></div>
      <div class="m-name" id="m-name"></div>
      <div class="m-desc" id="m-desc"></div>
      <div class="m-meta" id="m-meta"></div>
    </div>
    <div class="modal-body" id="m-body"></div>
  </div>
</div>

<script>
const R=[{id:1,cat:'indian',emoji:'🍛',time:'45 min',diff:{cs:'střední',en:'medium'},name:{cs:'Krémová indická zeleninová korma',en:'Creamy Indian Vegetable Korma'},desc:{cs:'Bohatá kari omáčka s kokosovým mlékem, jogurtem a kešu',en:'Rich curry sauce with coconut milk, yogurt and cashews'},cat_l:{cs:'Indická kuchyně',en:'Indian Cuisine'},ing:{cs:[{s:'Pro sauce',i:['3 stroužky česneku','1 jalapeño pepř, osetý','¼ šálku surových kešu','1 kus zázvoru (2,5 cm)','1 střední žlutá cibule']},{s:'Pro korma',i:['2 malá rajčata, na kostičky','1½ lžičky hnědého cukru','1 lžíce oleje','1 střední brambor na kostičky','1 šálek zelených fazolků','1 šálek zmrazeného hrášku a mrkve','¾ šálku jogurtu','½ šálku kokosového mléka','½ lžičky koriandru','⅛ lžičky kardamomu','½ lžičky černého pepře','½ lžičky soli','½ lžičky skořice','1 lžička garam masala','1 lžička kurkumy','2 lžičky kari']}],en:[{s:'For the sauce',i:['3 garlic cloves','1 jalapeño, seeded','¼ cup raw cashews','1 inch ginger','1 medium yellow onion']},{s:'For the korma',i:['2 small tomatoes, diced','1½ tsp brown sugar','1 tbsp oil','1 medium waxy potato, diced','1 cup green beans','1 cup frozen peas and carrots','¾ cup plain yogurt','½ cup coconut milk','½ tsp coriander','⅛ tsp cardamom','½ tsp black pepper','½ tsp salt','½ tsp cinnamon','1 tsp garam masala','1 tsp turmeric','2 tsp curry powder']}]},steps:{cs:['Cibuli, česnek, zázvor, jalapeño a kešu rozmixujte s ½ šálku vody do hladka.','Rozehřejte olej. Připravte koření do malé misky.','Nalijte pyré do pánve. Přidejte koření, vařte 2–3 min do vůně.','Přidejte rajčata, kokosové mléko, jogurt, cukr, brambory, hrášek a fazolky. Přikryjte, duste 10 min.','Odkryjte a vařte dalších 5–10 min. Podávejte s basmati rýží a naanem.'],en:['Blend onion, garlic, ginger, jalapeño and cashews with ½ cup water until smooth.','Heat oil over medium heat. Measure spices into a small bowl.','Pour purée into hot pan. Add spices, cook 2–3 min until fragrant.','Add tomatoes, coconut milk, yogurt, sugar, potato, peas and beans. Cover, simmer 10 min.','Uncover, cook 5–10 more min. Serve with basmati rice and naan.']}},{id:2,cat:'indian',emoji:'🫘',time:'60 min',diff:{cs:'střední',en:'medium'},name:{cs:'Tarka Dal',en:'Tarka Dal'},desc:{cs:'Tradiční čočková polévka s aromatickým tarka přelitím a koriandrem',en:'Traditional lentil soup with aromatic tarka tempering and coriander'},cat_l:{cs:'Indická kuchyně',en:'Indian Cuisine'},ing:{cs:[{s:'',i:['250 g chana dal, propláchnutá','3 lžíce oleje','1 lžíce semínek kmínu','1 malá cibule, nakrájená','3–4 zelené chilli, napíchnuté','2 cm čerstvý zázvor, na proužky','3 stroužky česneku, vcelku','3 rajčata','¾ lžičky kurkumy','¾ lžičky garam masala','1½ lžičky mletého koriandru','hrst čerstvého koriandru','sůl a pepř']}],en:[{s:'',i:['250g chana dal, rinsed','3 tbsp oil','1 tbsp cumin seeds','1 small onion, chopped','3–4 green chillies, pierced','2 cm fresh ginger, julienned','3 garlic cloves, whole','3 tomatoes','¾ tsp turmeric','¾ tsp garam masala','1½ tsp ground coriander','handful fresh coriander','salt and black pepper']}]},steps:{cs:['Dal a 900 ml vody přiveďte k varu. Seberte pěnu, přikryjte a vařte 35–40 min.','Uvařený dal metličkou rozbijte na kaši. Odstavte.','Rozehřejte olej, přidejte kmín — 20–30 s do vůně.','Přidejte cibuli, chilli a zázvor, opékejte 4–5 min dozlatova.','Česnek a rajčata rozmixujte, přidejte do pánve s kořením a 100 ml vody. Vařte 15–20 min.','Přidejte dal, promíchejte, přiveďte k varu. Dochuťte.','Vmíchejte čerstvý koriandr.'],en:['Bring dal and 900ml water to the boil. Skim foam, cover, simmer 35–40 min.','Whisk cooked dal until smooth. Set aside.','Heat oil, add cumin seeds 20–30 s until fragrant.','Add onion, chilli and ginger, sauté 4–5 min until golden.','Blend garlic and tomatoes, add to pan with spices and 100ml water. Cook 15–20 min.','Add cooked dal, stir, bring to boil. Season.','Stir in fresh chopped coriander just before serving.']}},{id:3,cat:'european',emoji:'🍄',time:'50 min',diff:{cs:'střední',en:'medium'},name:{cs:'Houbové Bourguignon',en:'Mushroom Bourguignon'},desc:{cs:'Vegetariánský francouzský klasik s Pinot Noir a česnekovou kaší',en:'Vegetarian French classic with Pinot Noir and silky garlic mash'},cat_l:{cs:'Francouzská kuchyně',en:'French Cuisine'},ing:{cs:[{s:'',i:['500 g hnědých žampionů, na čtvrtiny','3 mrkve, šikmá kolečka 1,5–2 cm','1 pórek nebo 2 šalotky','3 stroužky česneku, na plátky','200 ml suchého červeného vína (Pinot Noir)','400 ml zeleninového vývaru','1 lžíce rajčatového protlaku','tymián, bobkový list, sůl, pepř','1 lžíce hladké mouky','oříšek studeného másla']}],en:[{s:'',i:['500g brown mushrooms, quartered','3 carrots, sliced diagonally 1.5–2 cm','1 leek or 2 shallots','3 garlic cloves, sliced','200ml dry red wine (Pinot Noir)','400ml vegetable stock','1 tbsp tomato paste','thyme, bay leaf, salt, pepper','1 tbsp plain flour','knob of cold butter']}]},steps:{cs:['Na silném plameni opečte žampiony v jedné vrstvě bez solení dozhnědnutí. Vyjměte.','Snižte teplotu, přidejte pórek a mrkev, restujte 5 min.','Přidejte česnek a protlak, restujte 30–60 s.','Zaprašte moukou, zalijte vínem. Seškrábejte přípečky. Odpařte na polovinu.','Přilijte vývar, přidejte bylinky a houby. Duste pod pokličkou 20–25 min.','Vmíchejte oříšek studeného másla do lesku.'],en:['Sear mushrooms in one layer on high heat without salt until browned. Remove.','Reduce heat, add leek and carrots, sauté 5 min.','Add garlic and tomato paste, sauté 30–60 s.','Dust with flour, pour in wine. Scrape up bits. Reduce by half.','Add stock, herbs and mushrooms. Simmer covered 20–25 min.','Stir in cold butter until sauce turns glossy.']},tip:{cs:'Podávejte s bramborovou kaší: ohřejte mléko s rozmáčknutým česnekem a tymiánem, sceďte, vmíchejte do brambor s máslem.',en:'Serve with garlic mash: heat milk with crushed garlic and thyme, strain, whip into boiled potatoes with butter.'}},{id:4,cat:'european',emoji:'🧀',time:'35 min',diff:{cs:'snadné',en:'easy'},name:{cs:'Pečené Halloumi s cizrnou a medocitronovým dresinkem',en:'Baked Halloumi with Chickpeas & Honey-Lemon Dressing'},desc:{cs:'Zlatavý halloumi, křupavá cizrna, cherry rajčata, lehký dresink',en:'Golden halloumi, crispy chickpeas, cherry tomatoes, light dressing'},cat_l:{cs:'Středomořská kuchyně',en:'Mediterranean'},ing:{cs:[{s:'Základ',i:['2 balení Halloumi, plátky 1,5 cm','1 plechovka cizrny — DŮKLADNĚ osušená','250 g cherry rajčat, celá','1 červená cibule, na měsíčky','olivový olej, sušené oregano, sůl, pepř']},{s:'Dresink',i:['3 lžíce olivového oleje','1 lžíce medu','šťáva z ½ citronu']}],en:[{s:'Base',i:['2 packs halloumi, sliced 1.5 cm','1 can chickpeas — THOROUGHLY dried','250g cherry tomatoes, whole','1 red onion, cut into wedges','olive oil, dried oregano, salt, pepper']},{s:'Dressing',i:['3 tbsp olive oil','1 tbsp honey','juice of ½ lemon']}]},steps:{cs:['Troubu předehřejte na 200 °C horkovzduch.','Na plech dejte cizrnu, rajčata a cibuli s olejem a oreganem. Pečte 15–20 min.','Poklaďte plátky halloumi. Pečte dalších 10–12 min (nebo gril 5 min) dozlatova.','Ihned po vytažení přelijte dresinkem.'],en:['Preheat oven to 200°C fan.','On a baking tray spread chickpeas, tomatoes and onion with oil and oregano. Roast 15–20 min.','Lay halloumi slices over vegetables. Return for 10–12 min (or grill 5 min) until golden.','Immediately drizzle with the honey-lemon dressing.']},tip:{cs:'Tortillu nakrájejte na trojúhelníky a opečte dozlatova — skvělé chipsy na nabírání.',en:'Cut tortilla into triangles and dry-toast until golden — great scooping chips.'}},{id:5,cat:'indian',emoji:'🫙',time:'2 hod',diff:{cs:'náročné',en:'advanced'},name:{cs:'Punjabi Dal Makhani',en:'Punjabi Dal Makhani'},desc:{cs:'Hedvábný dal z urad čočky a fazolí s máslem a smetanou',en:'Silky dal from urad lentils and kidney beans with butter and cream'},cat_l:{cs:'Indická kuchyně',en:'Indian Cuisine'},ing:{cs:[{s:'',i:['¾ šálku (140 g) celé urad dal','¼ šálku (40 g) červených fazolí','1 cibule, jemně nakrájená','2 velká rajčata nebo 1 šálek pyré','2 lžičky zázvorovo-česnekové pasty','1 zelená paprika','3 lžíce másla','¼–⅓ šálku smetany','½ lžičky červeného chilli','½ lžičky kmínu','2–3 hřebíčky, 2–3 zelené kardamomy','1 černý kardamom, 1 palcová skořice','1 bobkový list','¼ lžičky kasuri methi','2–3 špetky muškátového oříšku','sůl dle chuti']}],en:[{s:'',i:['¾ cup (140g) whole urad dal','¼ cup (40g) kidney beans','1 onion, finely chopped','2 large tomatoes or 1 cup purée','2 tsp ginger-garlic paste','1 green chilli','3 tbsp butter','¼–⅓ cup cream','½ tsp red chilli powder','½ tsp cumin seeds','2–3 cloves, 2–3 green cardamoms','1 black cardamom, 1 inch cinnamon','1 bay leaf','¼ tsp kasuri methi','2–3 pinches nutmeg','salt to taste']}]},steps:{cs:['Dal a fazole namočte 8–9 hodin. Slijte.','Tlakový hrnec: 18–20 píšťalek. Normální hrnec: 45–60 min. Vše musí být měkké.','Rozehřejte máslo. Přidejte celé koření, restujte do vůně.','Přidejte cibuli, restujte dozlatova. Přidejte pastu a chilli.','Přidejte rajčatové pyré a muškát. Vařte dokud tuk nevystoupí.','Přidejte dal s 1 šálkem vody. Duste bez pokličky 25 min za míchání.','Vmíchejte smetanu a kasuri methi. Dochuťte. Podávejte s rýží.'],en:['Soak dal and beans 8–9 hours. Drain.','Pressure cook: 18–20 whistles. Pot: 45–60 min. Both must be very soft.','Heat butter. Add whole spices, sauté until aromatic.','Add onion, sauté until golden. Add paste and chilli.','Add tomato purée and nutmeg. Cook until fat separates.','Add dal with 1 cup water. Simmer uncovered 25 min, stirring often.','Stir in cream and kasuri methi. Season. Serve with rice.']}},{id:6,cat:'european',emoji:'🎃',time:'75 min',diff:{cs:'střední',en:'medium'},name:{cs:'Vegetariánská svíčková z dýně',en:'Vegetarian Pumpkin "Svíčková"'},desc:{cs:'Česká klasika v rostlinném provedení — pečená hokkaido dýně, smetanová omáčka',en:'Czech classic reimagined — roasted hokkaido pumpkin, creamy sauce'},cat_l:{cs:'Česká kuchyně',en:'Czech Cuisine'},ing:{cs:[{s:'',i:['800 g dýně Hokkaido, neoloupaná, ~3 cm kostky','2 mrkve, 2 petržele, ½ celeru','3 velké žluté cibule','250 ml smetany ke šlehání (min. 31 %)','100 g ghí nebo řepkového oleje','1 citron — šťáva i kůra','1–2 lžíce plnotučné hořčice','ocet, 1–2 lžíce třtinového cukru','4 bobkové listy, 6 nové koření, 10 pepřů','špetka jedlé sody','zeleninový vývar ~1 litr','brusinky v gelu k servírování']}],en:[{s:'',i:['800g hokkaido pumpkin, unpeeled, ~3 cm cubes','2 carrots, 2 parsley roots, ½ celeriac','3 large yellow onions','250ml whipping cream (min. 31%)','100g ghee or rapeseed oil','1 lemon — juice and zest','1–2 tbsp full-fat mustard','vinegar, 1–2 tbsp cane sugar','4 bay leaves, 6 allspice, 10 peppercorns','pinch of baking soda','vegetable stock ~1 litre','cranberry jelly to serve']}]},steps:{cs:['Dýni v míse promíchejte s olejem a solí — každá kostka musí být obalená. Pečte na papíru na 200 °C, 20–30 min do zhnědnutí okrajů.','Restujte mrkev, celer a petržel v tuku do změny barvy.','Přidejte cibuli, karamelizujte s jedlou sodou a cukrem do tmavě hnědé. Přidejte lžíci octa.','Přidejte koření a hořčici, nechte krátce vypražit.','Přidejte dýni, zalijte vývarem. Vařte 15 min.','Vyjměte celé koření, rozmixujte dohladka. Přidejte smetanu, přiveďte k varu.','Dolaďte solí, citronem a octem. Podávejte s knedlíkem a brusinkami.'],en:['Toss pumpkin in a bowl with oil and salt — coat every cube. Roast on lined tray at 200°C for 20–30 min until edges brown.','Sauté carrots, celeriac and parsley root until they release colour.','Add onions, caramelise with baking soda and sugar to deep brown. Add a splash of vinegar.','Add spices and mustard, let mustard toast briefly.','Add pumpkin, cover with stock. Cook 15 min.','Remove whole spices and blend until smooth. Add cream, bring to boil.','Season with salt, lemon and vinegar. Serve with bread dumplings and cranberry jelly.']}},{id:7,cat:'indian',emoji:'🟢',time:'40 min',diff:{cs:'střední',en:'medium'},name:{cs:'Matar Paneer',en:'Matar Paneer'},desc:{cs:'Čerstvý sýr paneer s hráškem v aromatické kešu-rajčatové masale',en:'Fresh paneer with peas in an aromatic cashew-tomato masala'},cat_l:{cs:'Indická kuchyně',en:'Indian Cuisine'},ing:{cs:[{s:'Masala pasta',i:['10–12 kešu, 1–2 zelené papriky','2–3 stroužky česneku','3 zralá rajčata','½ palce zázvoru, 1 střední cibule','2–3 hřebíčky, ½ palce skořice','1 lžička celého koriandru','4–5 celých černých pepřů','2 lžíce listů koriandru']},{s:'Matar paneer',i:['250–300 g paneer, na kostky','1 šálek hrášku','2–2,5 lžíce oleje nebo ghí','½ lžičky kmínu, ¼ lžičky kurkumy','¼–½ lžičky červeného chilli','¼–½ lžičky garam masala','½ lžičky cukru, sůl dle chuti','1 lžíce smetany (volitelně)','listy koriandru na ozdobu']}],en:[{s:'Masala paste',i:['10–12 cashews, 1–2 green chillies','2–3 garlic cloves','3 ripe tomatoes','½ inch ginger, 1 medium onion','2–3 cloves, ½ inch cinnamon','1 tsp coriander seeds','4–5 whole black peppercorns','2 tbsp coriander leaves']},{s:'Matar paneer',i:['250–300g paneer, cubed','1 cup peas (fresh or frozen)','2–2.5 tbsp oil or ghee','½ tsp cumin, ¼ tsp turmeric','¼–½ tsp red chilli','¼–½ tsp garam masala','½ tsp sugar, salt to taste','1 tbsp cream (optional)','coriander leaves to garnish']}]},steps:{cs:['Všechny ingredience na pastu rozmixujte dohladka bez vody.','Rozehřejte olej, přidejte kmín, nechte přeskočit.','Přidejte pastu, restujte 10–12 min, dokud se olej neoddělí.','Přidejte kurkumu, chilli a garam masala. Volitelně smetanu.','Přidejte hrášek, vodu a sůl. Vařte do měkka.','Přidejte paneer, duste 1–2 min. Nepřevařujte!','Ozdobte koriandrem. Podávejte s naanem nebo rýží.'],en:['Blend all paste ingredients until smooth — no water needed.','Heat oil, add cumin seeds, let them splutter.','Add paste, sauté 10–12 min on low until oil separates.','Add turmeric, chilli and garam masala. Optionally add cream.','Add peas, water and salt. Cook until soft.','Add paneer, simmer 1–2 min on low. Do not overcook!','Garnish with coriander. Serve with naan or rice.']}},{id:8,cat:'european',emoji:'🥦',time:'45 min',diff:{cs:'snadné',en:'easy'},name:{cs:'Zapečená brabantská zelenina',en:'Belgian-Style Vegetable Gratin'},desc:{cs:'Květák a brambory zapečené s ricottou, vejci a trojitou sýrovou krustou',en:'Cauliflower and potato bake with ricotta, eggs and a triple-cheese crust'},cat_l:{cs:'Evropská kuchyně',en:'European Cuisine'},ing:{cs:[{s:'Pro 4–5 osob',i:['2 větší květáky (nebo 1 + 1 kg brokolice)','1,2 kg brambor, na 1 cm plátky','2 × 250 g Ricotta','8 vajec','500 ml smetany 31–33 %','300 g Gouda nebo Eidam','100 g Niva nebo modrý sýr','150 g Mozzarella na strouhání','sůl, pepř, hodně muškátového oříšku','3 stroužky česneku','máslo a strouhanka na formu']}],en:[{s:'Serves 4–5',i:['2 large cauliflowers (or 1 + 1 kg broccoli)','1.2 kg potatoes, sliced 1 cm','2 × 250g ricotta','8 eggs','500ml cream 31–33%','300g Gouda or Edam','100g blue cheese','150g mozzarella (grating type)','salt, pepper, plenty of nutmeg','3 garlic cloves','butter and breadcrumbs for the dish']}]},steps:{cs:['Brambory vařte 8 min, přidejte květák, vařte 5 min. Sceďte a nechte 2–3 min vydýchat.','Rozmačkejte Ricottu s vejci do hladka, pak přilévejte smetanu. Přidejte česnek, sůl, pepř a muškát.','Pekáč vymažte máslem a vysypejte strouhankou.','Promíchejte zeleninu v pekáči. Zalijte směsí. Zasypejte sýry (350–400 g).','Pečte na 180 °C horkovzduch 30–35 min do zlatohnědé bublinky.'],en:['Cook potatoes 8 min, add cauliflower, cook 5 more min. Drain and steam-dry 2–3 min.','Mash ricotta with eggs until smooth, then add cream. Add garlic, salt, pepper and nutmeg.','Butter the dish and coat with breadcrumbs.','Mix vegetables in the dish. Pour over cream mixture. Top with cheeses (350–400 g).','Bake at 180°C fan 30–35 min until golden and bubbly.']},tip:{cs:'Zamíchej do smetany lžíci plnotučné hořčice pro ještě výraznější chuť.',en:'Stir a tablespoon of full-fat mustard into the cream for extra punch.'}},{id:9,cat:'indian',emoji:'🍚',time:'25 min',diff:{cs:'snadné',en:'easy'},name:{cs:'Rádžasthánská rýže s rozinkami',en:'Rajasthani Spiced Rice with Raisins'},desc:{cs:'Tradiční jídlo z Rádžasthánu — kari rýže s brambory, hráškem a sladkými rozinkami',en:'Traditional Rajasthan dish — spiced rice with potatoes, peas and sweet raisins'},cat_l:{cs:'Indická kuchyně',en:'Indian Cuisine'},ing:{cs:[{s:'',i:['280 g rýže — propláchnutá 10× dokud voda není čirá!','4 menší brambory, na kostky','2 malé cibule','6 malých rajčat, nakrájených','hrst světlých rozinek','2–3 lžíce hrášku','2,5 lžičky kari koření','1 lžička chilli, 1,5 lžičky soli','zarovnaná lžička kmínu','voda — dvojnásobek objemu rýže']}],en:[{s:'',i:['280g rice — rinsed 10 times until water runs clear!','4 small potatoes, cubed','2 small onions','6 small tomatoes, chopped','handful of light raisins','2–3 tbsp peas','2.5 tsp curry powder','1 tsp chilli, 1.5 tsp salt','1 level tsp cumin','water — double the volume of rice']}]},steps:{cs:['V rozpáleném tuku restujte kmín půl minuty.','Přidejte kari, chilli a sůl, po pár sekundách zalijte vodou.','Přidejte hrášek, cibulku a brambory, přiveďte do varu.','Přidejte propláchnutou rýži. Přikryjte, vařte ~10 min. Neodkrývat!','Po vyvaření vody vypněte. Pod pokličku přihoďte rajčata a rozinky, přikryjte na 2 min.'],en:['In hot fat, fry cumin seeds for half a minute.','Add curry, chilli and salt, stir, then add water.','Add peas, onion and potatoes, bring to boil.','Add rinsed rice. Cover and cook ~10 min. Do not lift lid!','Once water absorbed, turn off heat. Add tomatoes and raisins under lid, cover 2 min.']}},{id:10,cat:'dessert',emoji:'🥛',time:'50 min',diff:{cs:'snadné',en:'easy'},name:{cs:'Rýžový kheer (Chawal ki Kheer)',en:'Rice Kheer (Chawal ki Kheer)'},desc:{cs:'Tradiční indický rýžový dezert s kardamomem a šafránem',en:'Traditional Indian rice pudding with cardamom and saffron'},cat_l:{cs:'Indický dezert',en:'Indian Dessert'},ing:{cs:[{s:'4 porce',i:['1 litr plnotučného mléka','70 g bílé rýže (nejlépe basmati)','70–80 g cukru dle chuti','3–4 zelené kardamomové tobolky','špetka šafránu (volitelně)','2 lžíce nasekaných mandlí nebo pistácií']}],en:[{s:'Serves 4',i:['1 litre whole milk','70g white rice (basmati preferred)','70–80g sugar to taste','3–4 green cardamom pods','pinch of saffron (optional)','2 tbsp chopped almonds or pistachios']}]},steps:{cs:['Rýži propláchni, dokud není voda čirá.','Mléko přiveď k varu, přidej rozmáčknuté kardamomové tobolky.','Přidej rýži, ztlum plamen. Vař pomalu 35–40 min za častého míchání.','Vmíchej cukr a volitelně šafrán. Nech 5 min prolnout chutě.','Posyp oříšky. Podávej teplý nebo vychlazeně ze lednice.','Studený chutná krémověji. Variace: vmíchej čerstvé ovoce po vychladnutí.'],en:['Rinse rice until water runs clear.','Bring milk to the boil, add lightly crushed cardamom pods.','Add rice, reduce heat. Simmer gently 35–40 min, stirring frequently.','Stir in sugar and optionally saffron. Cook 5 more min.','Sprinkle with nuts. Serve warm or well chilled.','Chilled version tastes creamier. Variation: fold in fresh fruit once cooled.']}}];

let lang='cs', filt='all';

function setLang(l){lang=l;document.getElementById('btn-cs').classList.toggle('on',l==='cs');document.getElementById('btn-en').classList.toggle('on',l==='en');const t=T[l];document.getElementById('hero-badge').textContent=t.badge;document.getElementById('hero-title').innerHTML=t.title;document.getElementById('hero-sub').textContent=t.sub;document.getElementById('search').placeholder=t.placeholder;document.getElementById('cnt-lbl').textContent=t.cntLbl;document.getElementById('logo').innerHTML=t.logo;document.getElementById('footer-txt').textContent=t.footer;document.querySelectorAll('.fb').forEach((b,i)=>{b.textContent=t.filters[i];});render();}

function setF(f,btn){filt=f;document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));btn.classList.add('on');render();}

function render(){const q=document.getElementById('search').value.toLowerCase().trim();const grid=document.getElementById('grid');const list=R.filter(r=>{const fOk=filt==='all'||r.cat===filt;const qOk=!q||r.name.cs.toLowerCase().includes(q)||r.name.en.toLowerCase().includes(q)||r.desc.cs.toLowerCase().includes(q)||r.desc.en.toLowerCase().includes(q);return fOk&&qOk;});document.getElementById('cnt-n').textContent=list.length;if(!list.length){grid.innerHTML=`<div class="empty"><div class="icon">🔍</div>${T[lang].noRes}</div>`;return;}grid.innerHTML=list.map((r,i)=>`<article class="card" onclick="openM(${r.id})" role="button" tabindex="0" onkeydown="if(event.key==='Enter')openM(${r.id})" style="animation-delay:${Math.min(i,6)*0.05}s"><span class="card-emoji">${r.emoji}</span><div class="card-cat">${r.cat_l[lang]}</div><div class="card-name">${r.name[lang]}</div><div class="card-desc">${r.desc[lang]}</div><div class="card-meta"><span>⏱ ${r.time}</span><span>◎ ${r.diff[lang]}</span></div></article>`).join('');}

function openM(id){const r=R.find(x=>x.id===id);if(!r)return;const t=T[lang];document.getElementById('m-emoji').textContent=r.emoji;document.getElementById('m-cat').textContent=r.cat_l[lang];document.getElementById('m-name').textContent=r.name[lang];document.getElementById('m-desc').textContent=r.desc[lang];document.getElementById('m-meta').innerHTML=`<span>⏱ ${r.time}</span><span style="margin-left:4px">◎ ${r.diff[lang]}</span>`;let html=`<div class="sec-ttl">${t.ing}</div>`;(r.ing[lang]||r.ing.cs).forEach(sec=>{if(sec.s)html+=`<div class="sub-lbl">${sec.s}</div>`;html+=`<ul class="ing-list">${sec.i.map(x=>`<li><span class="dot"></span>${x}</li>`).join('')}</ul>`;});html+=`<div class="sec-ttl">${t.steps}</div><ol class="steps-list">`;(r.steps[lang]||r.steps.cs).forEach((s,i)=>{html+=`<li><span class="sn">${i+1}</span><span>${s}</span></li>`;});html+=`</ol>`;if(r.tip){html+=`<div class="sec-ttl">${t.tip}</div><div class="tip-box">${(r.tip[lang]||r.tip.cs)}</div>`;}document.getElementById('m-body').innerHTML=html;document.getElementById('overlay').classList.add('open');document.getElementById('overlay').querySelector('.modal').scrollTop=0;document.body.style.overflow='hidden';}

function closeM(){document.getElementById('overlay').classList.remove('open');document.body.style.overflow='';}
function overlayClick(e){if(e.target===document.getElementById('overlay'))closeM();}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeM();});
render();
</script>
</body>
</html>
