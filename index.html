<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌿 Vegetariánské recepty</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>

::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: #080b0f; }
::-webkit-scrollbar-thumb { 
  background: #d4a84b; 
  border-radius: 10px; 
  border: 2px solid #080b0f; 
}

  
:root {
  --bg:          #080b0f;
  --glass:       rgba(255,255,255,0.055);
  --glass-md:    rgba(255,255,255,0.08);
  --glass-lg:    rgba(10,13,20,0.88);
  --border:      rgba(255,255,255,0.09);
  --border-hi:   rgba(255,255,255,0.18);
  --shine:       rgba(255,255,255,0.12);
  --blur-sm:     16px;
  --blur-md:     32px;
  --blur-lg:     56px;
  --r:           22px;
  --r-sm:        14px;
  --r-full:      100px;
  --gold:        #d4a84b;
  --gold-dim:    rgba(212,168,75,0.18);
  --gold-glow:   rgba(212,168,75,0.08);
  --teal:        #4ecdc4;
  --teal-dim:    rgba(78,205,196,0.12);
  --text:        #f0ede8;
  --muted:       rgba(240,237,232,0.52);
  --subtle:      rgba(240,237,232,0.28);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: 'Outfit', system-ui, sans-serif;
  color: var(--text);
  background: var(--bg);
  min-height: 100vh;
  margin: 0;
  display: flex; /* Důležité pro footer */
  flex-direction: column; /* Důležité pro footer */
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: -1;
  background: 
    linear-gradient(160deg, rgba(8,11,15,0.94) 0%, rgba(8,11,15,0.82) 50%, rgba(8,11,15,0.96) 100%),
    url('cooking-background 3.jpg'); 
  background-attachment: fixed;
  background-position: center;
  background-size: cover;
  filter: brightness(0.85) contrast(1.05);
}

/* Zajištění, že main zabere veškerý volný prostor a odtlačí footer */
main {
  flex: 1 0 auto;
  position: relative;
  z-index: 1;
}

/* Subtle noise texture */
body::after {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 180px;
}

.z1 { position: relative; z-index: 1; }

/* ── HEADER ── */
header {
  position: sticky; top: 0; z-index: 100;
  backdrop-filter: blur(var(--blur-md)) saturate(180%);
  -webkit-backdrop-filter: blur(var(--blur-md)) saturate(180%);
  background: rgba(8,11,15,0.72);
  border-bottom: 1px solid var(--border);
}
.header-inner {
  max-width: 1120px; margin: 0 auto;
  padding: 14px 28px;
  display: flex; align-items: center; justify-content: space-between;
}
.logo {
  font-family: 'Playfair Display', serif;
  font-size: 1.2rem; font-weight: 500;
  letter-spacing: -0.01em; color: var(--text);
}
.logo .a { color: var(--gold); font-style: italic; }

.lang-tog {
  display: flex; gap: 4px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: var(--r-full);
  padding: 3px;
}
.lang-tog button {
  background: none; border: none; cursor: pointer;
  padding: 5px 13px; border-radius: var(--r-full);
  font-family: 'Outfit', sans-serif; font-size: .78rem; font-weight: 500;
  color: var(--muted); letter-spacing: .06em;
  transition: background .2s, color .2s;
}
.lang-tog button.on {
  background: rgba(255,255,255,0.10);
  color: var(--text);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.12);
}

/* ── HERO ── */
.hero {
  max-width: 1120px; margin: 0 auto;
  padding: 72px 28px 44px;
  text-align: center;
}
.hero-eyebrow {
  display: inline-flex; align-items: center; gap: 7px;
  background: var(--glass);
  border: 1px solid var(--border-hi);
  border-radius: var(--r-full);
  padding: 6px 16px; margin-bottom: 26px;
  font-size: .72rem; font-weight: 500; letter-spacing: .12em;
  text-transform: uppercase; color: var(--gold);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
}
.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2.6rem, 6vw, 4.4rem);
  font-weight: 500; line-height: 1.12;
  letter-spacing: -0.025em;
  margin-bottom: 16px;
}
.hero h1 em { color: var(--gold); font-style: italic; }
.hero-sub {
  color: var(--muted); font-size: 1rem; font-weight: 300;
  line-height: 1.6; margin-bottom: 36px;
}

/* ── SEARCH ── */
.search-wrap {
  position: relative; max-width: 520px; margin: 0 auto 20px;
}
.search-wrap input {
  width: 100%; padding: 14px 48px 14px 20px;
  background: var(--glass-md);
  border: 1px solid var(--border-hi);
  border-radius: var(--r-full);
  color: var(--text); font-family: 'Outfit', sans-serif; font-size: .95rem; font-weight: 300;
  outline: none;
  backdrop-filter: blur(var(--blur-sm)); -webkit-backdrop-filter: blur(var(--blur-sm));
  transition: border-color .2s, background .2s;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.06), 0 4px 24px rgba(0,0,0,.3);
}
.search-wrap input::placeholder { color: var(--subtle); }
.search-wrap input:focus {
  border-color: rgba(212,168,75,0.4);
  background: rgba(255,255,255,0.10);
}
.si {
  position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
  color: var(--subtle); font-size: 1.1rem; pointer-events: none;
}
.cnt-badge {
  font-size: .8rem; color: var(--subtle); margin-bottom: 0;
  letter-spacing: .02em;
}
.cnt-badge span:first-child { color: var(--gold); font-weight: 500; }

/* ── FILTER PILLS ── */
.filters {
  max-width: 1120px; margin: 0 auto 36px;
  padding: 0 28px;
  display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
}
.fb {
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: var(--r-full);
  padding: 8px 20px;
  color: var(--muted); font-family: 'Outfit', sans-serif;
  font-size: .84rem; font-weight: 400; cursor: pointer;
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  transition: background .2s, color .2s, border-color .2s, transform .15s;
  white-space: nowrap;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.06);
}
.fb:hover { background: var(--glass-md); color: var(--text); transform: translateY(-1px); }
.fb.on {
  background: rgba(212,168,75,0.15);
  border-color: rgba(212,168,75,0.4);
  color: var(--gold);
  box-shadow: inset 0 1px 0 rgba(212,168,75,.15), 0 0 20px rgba(212,168,75,0.08);
}

/* ── MAIN WRAP ── */
.wrap { max-width: 1120px; margin: 0 auto; padding: 0 28px; }

/* ── FEATURED CARD (Maillard — full width) ── */
.featured-card {
  position: relative; overflow: hidden;
  background: rgba(25,18,8,0.65);
  border: 1px solid rgba(212,168,75,0.25);
  border-radius: 28px;
  padding: 42px 48px;
  margin-bottom: 28px;
  cursor: pointer;
  backdrop-filter: blur(var(--blur-md)) saturate(160%);
  -webkit-backdrop-filter: blur(var(--blur-md)) saturate(160%);
  box-shadow: 0 2px 0 inset rgba(255,255,255,.07), 0 24px 80px rgba(0,0,0,.4), 0 0 60px rgba(212,168,75,0.05);
  transition: transform .2s, box-shadow .2s;
  animation: fadeUp .5s both;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 28px; align-items: center;
}
.featured-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 2px 0 inset rgba(255,255,255,.09), 0 32px 100px rgba(0,0,0,.45), 0 0 80px rgba(212,168,75,0.10);
}
/* Glowing heat effect — top left */
.featured-card::before {
  content: '';
  position: absolute; top: -60px; left: -40px;
  width: 280px; height: 280px; border-radius: 50%;
  background: radial-gradient(circle, rgba(212,168,75,0.12) 0%, transparent 70%);
  pointer-events: none;
}
/* Right side vertical accent line */
.featured-card::after {
  content: '';
  position: absolute; right: 0; top: 15%; bottom: 15%;
  width: 3px;
  background: linear-gradient(180deg, transparent, rgba(212,168,75,.5), transparent);
  border-radius: 2px 0 0 2px;
}
.fc-left {}
.fc-label {
  font-size: .7rem; font-weight: 600; letter-spacing: .14em;
  text-transform: uppercase; color: var(--gold);
  margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
}
.fc-label::before {
  content: ''; display: inline-block;
  width: 20px; height: 1px; background: var(--gold); opacity: .6;
}
.fc-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.7rem, 3.5vw, 2.6rem);
  font-weight: 500; line-height: 1.18;
  margin-bottom: 12px;
}
.fc-desc {
  color: var(--muted); font-size: .95rem; font-weight: 300;
  line-height: 1.65; max-width: 580px;
}
.fc-meta {
  display: flex; gap: 20px; margin-top: 20px;
  font-size: .78rem; color: var(--subtle);
}
.fc-emoji {
  font-size: 4.5rem; line-height: 1;
  filter: drop-shadow(0 0 24px rgba(212,168,75,0.3));
  user-select: none;
}
.fc-cta {
  display: inline-flex; align-items: center; gap: 8px;
  margin-top: 22px;
  background: rgba(212,168,75,0.12);
  border: 1px solid rgba(212,168,75,0.3);
  border-radius: var(--r-full);
  padding: 9px 22px;
  font-size: .82rem; font-weight: 500; color: var(--gold);
  transition: background .2s, transform .15s;
}
.fc-cta:hover { background: rgba(212,168,75,0.20); transform: translateX(2px); }

/* ── CARD GRID ── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 16px;
  padding-bottom: 60px;
}

/* ── RECIPE CARD ── */
.card {
  position: relative; overflow: hidden;
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 26px 24px 22px;
  cursor: pointer;
  backdrop-filter: blur(var(--blur-sm)) saturate(160%);
  -webkit-backdrop-filter: blur(var(--blur-sm)) saturate(160%);
  transition: transform .2s, box-shadow .2s, background .2s;
  animation: fadeUp .45s both;
  box-shadow: inset 0 1px 0 var(--shine), 0 2px 20px rgba(0,0,0,.25);
}
.card::before {
  content: '';
  position: absolute; inset: 0; border-radius: var(--r);
  background: linear-gradient(135deg, rgba(255,255,255,.04) 0%, transparent 60%);
  pointer-events: none;
}
.card:hover {
  transform: translateY(-3px);
  background: var(--glass-md);
  box-shadow: inset 0 1px 0 var(--shine), 0 12px 40px rgba(0,0,0,.3);
}
.card:focus { outline: 2px solid var(--gold); outline-offset: 2px; }

.card-emoji { font-size: 1.8rem; display: block; margin-bottom: 12px; line-height: 1; }
.card-cat {
  font-size: .68rem; font-weight: 500; letter-spacing: .12em;
  text-transform: uppercase; color: var(--gold); margin-bottom: 8px; opacity: .8;
}
.card-name {
  font-family: 'Playfair Display', serif;
  font-size: 1.25rem; font-weight: 500; line-height: 1.28;
  margin-bottom: 9px;
}
.card-desc {
  color: var(--muted); font-size: .84rem; font-weight: 300;
  line-height: 1.58; margin-bottom: 16px;
}
.card-meta {
  display: flex; gap: 14px; font-size: .76rem; color: var(--subtle);
}
/* technique card in grid (when filtered to technique) */
.card[data-cat="technique"] {
  border-color: rgba(212,168,75,0.22);
  background: rgba(30,20,8,0.55);
}

/* ── MODAL / OVERLAY ── */
.overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,.6);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  opacity: 0; pointer-events: none;
  transition: opacity .28s;
}
.overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--glass-lg);
  backdrop-filter: blur(var(--blur-lg)) saturate(200%);
  -webkit-backdrop-filter: blur(var(--blur-lg)) saturate(200%);
  border: 1px solid var(--border-hi);
  border-radius: 28px;
  max-width: 720px; width: 100%; max-height: 88vh; overflow-y: auto;
  transform: scale(.94) translateY(24px);
  transition: transform .34s cubic-bezier(.34,1.3,.64,1);
  box-shadow: 0 40px 120px rgba(0,0,0,.65), inset 0 1px 0 rgba(255,255,255,.10);
}
.overlay.open .modal { transform: scale(1) translateY(0); }
.modal-hdr {
  padding: 32px 32px 24px;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 1;
  background: rgba(6,8,14,.95);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border-radius: 28px 28px 0 0;
}
.mclose {
  position: absolute; top: 20px; right: 20px;
  background: rgba(255,255,255,.07); border: 1px solid var(--border);
  border-radius: 50%; width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--muted); font-size: .9rem;
  transition: background .2s, color .2s;
}
.mclose:hover { background: rgba(255,255,255,.13); color: var(--text); }
.m-emoji { font-size: 2rem; display: block; margin-bottom: 8px; line-height: 1; }
.m-cat   { font-size: .7rem; font-weight: 500; letter-spacing: .12em; text-transform: uppercase; color: var(--gold); margin-bottom: 7px; }
.m-name  { font-family: 'Playfair Display', serif; font-size: 1.9rem; font-weight: 500; line-height: 1.18; padding-right: 44px; }
.m-desc  { color: var(--muted); font-size: .9rem; font-weight: 300; margin-top: 8px; line-height: 1.62; }
.m-meta  { display: flex; gap: 16px; margin-top: 12px; font-size: .78rem; color: var(--subtle); }
.modal-body { padding: 26px 32px 34px; }
.sec-ttl {
  font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 500;
  color: var(--gold); margin: 26px 0 13px; padding-bottom: 8px;
  border-bottom: 1px solid var(--border); letter-spacing: .01em;
}
.sec-ttl:first-child { margin-top: 0; }
.sub-lbl { font-size: .7rem; font-weight: 500; text-transform: uppercase; letter-spacing: .10em; color: var(--subtle); margin: 14px 0 7px; }
.ing-list { list-style: none; display: grid; gap: 5px; }
.ing-list li {
  padding: 8px 14px; background: rgba(255,255,255,.04); border: 1px solid var(--border);
  border-radius: var(--r-sm); font-size: .88rem; font-weight: 300;
  display: flex; align-items: center; gap: 10px; transition: background .18s;
}
.ing-list li:hover { background: rgba(255,255,255,.07); }
.dot { width: 5px; height: 5px; background: var(--gold); border-radius: 50%; flex-shrink: 0; opacity: .6; }
.steps-list { list-style: none; display: grid; gap: 11px; }
.steps-list li {
  padding: 14px 18px; background: rgba(255,255,255,.04); border: 1px solid var(--border);
  border-radius: 16px; font-size: .88rem; font-weight: 300; line-height: 1.72;
  display: grid; grid-template-columns: 30px 1fr; gap: 14px; align-items: start;
  transition: background .18s;
}
.steps-list li:hover { background: rgba(255,255,255,.07); }
.sn {
  background: var(--gold-dim); color: var(--gold); border-radius: 50%;
  width: 26px; height: 26px; display: flex; align-items: center; justify-content: center;
  font-size: .76rem; font-weight: 500; flex-shrink: 0; margin-top: 2px;
  border: 1px solid rgba(212,168,75,.25);
}
.tip-box {
  background: rgba(212,168,75,.05); border: 1px solid rgba(212,168,75,.17);
  border-radius: 16px; padding: 14px 18px;
  font-size: .88rem; font-weight: 300; line-height: 1.72; color: var(--muted);
}
.modal::-webkit-scrollbar { width: 4px; }
.modal::-webkit-scrollbar-thumb { background: rgba(255,255,255,.12); border-radius: 4px; }

/* ── EMPTY STATE ── */
.empty { grid-column: 1/-1; text-align: center; padding: 80px 24px; color: var(--muted); }
.empty .icon { font-size: 2.6rem; margin-bottom: 12px; }

/* ── FOOTER ── */
footer {
  flex-shrink: 0;
  position: relative;
  z-index: 1;
  border-top: 1px solid var(--border);
  padding: 48px 28px;
  text-align: center;
  background: rgba(8, 11, 15, 0.85);
  backdrop-filter: blur(20px);
  margin-top: auto; /* Toto ho dotlačí dospodu */
}

/* ── ANIMATIONS ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}
.card:nth-child(1)  { animation-delay: .04s; }
.card:nth-child(2)  { animation-delay: .09s; }
.card:nth-child(3)  { animation-delay: .14s; }
.card:nth-child(4)  { animation-delay: .18s; }
.card:nth-child(5)  { animation-delay: .22s; }
.card:nth-child(6)  { animation-delay: .26s; }
.card:nth-child(n+7){ animation-delay: .30s; }

/* ── RESPONSIVE ── */
@media (max-width: 700px) {
  .wrap, .hero, .filters { padding-left: 16px; padding-right: 16px; }
  .header-inner { padding: 12px 16px; }
  .hero { padding: 52px 16px 32px; }
  .grid { grid-template-columns: 1fr; }
  .featured-card { grid-template-columns: 1fr; padding: 28px 24px; gap: 16px; }
  .fc-emoji { font-size: 3rem; }
  .fc-title { font-size: 1.6rem; }
  .modal { border-radius: 22px; max-height: 92vh; }
  .modal-hdr { padding: 24px 20px 18px; border-radius: 22px 22px 0 0; }
  .m-name { font-size: 1.55rem; }
  .modal-body { padding: 18px 18px 26px; }
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo z1" id="logo">🌿 <span class="a">Naše</span> recepty</div>
    <div class="lang-tog">
      <button id="btn-cs" class="on" onclick="setLang('cs')">CZ</button>
      <button id="btn-en" onclick="setLang('en')">EN</button>
    </div>
  </div>
</header>

<main>
  <section class="hero z1">
    <div class="hero-eyebrow" id="hero-badge">🥬 Ověřené recepty</div>
    <h1 id="hero-title"><em>Vegetariánské</em> recepty</h1>
    <p class="hero-sub" id="hero-sub">Naše oblíbená rodinná jídla z celého světa</p>
    <div class="search-wrap">
      <input type="text" id="search" placeholder="Hledat recept…" oninput="render()" autocomplete="off">
      <span class="si">⌕</span>
    </div>
    <div class="cnt-badge">
      <span id="cnt-n"></span>&thinsp;<span id="cnt-lbl">receptů</span>
    </div>
  </section>

  <div class="filters z1" id="filters">
    <button class="fb on" data-f="all"      onclick="setF('all',this)">Vše</button>
    <button class="fb"    data-f="indian"   onclick="setF('indian',this)">🇮🇳 Indická</button>
    <button class="fb"    data-f="european" onclick="setF('european',this)">🇪🇺 Evropská</button>
    <button class="fb"    data-f="basics"   onclick="setF('basics',this)">🫕 Základy</button>
    <button class="fb"    data-f="dessert"  onclick="setF('dessert',this)">🍮 Dezerty</button>
    <button class="fb"    data-f="technique" onclick="setF('technique',this)">🔥 Techniky</button>
  </div>

  <div class="wrap z1">
    <div id="featured-slot"></div>
    <div class="grid" id="grid"></div>
  </div>
</main>

<footer class="z1"><span id="footer-txt">Naše oblíbené vegetariánské recepty · Vždy dostupné</span></footer>

<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-hdr">
      <button class="mclose" onclick="closeM()">✕</button>
      <span class="m-emoji" id="m-emoji"></span>
      <div class="m-cat"  id="m-cat"></div>
      <div class="m-name" id="m-name"></div>
      <div class="m-desc" id="m-desc"></div>
      <div class="m-meta" id="m-meta"></div>
    </div>
    <div class="modal-body" id="m-body"></div>
  </div>
</div>

<script>
const R=[
{id:1,cat:'indian',emoji:'🍛',time:'45 min',diff:{cs:'střední',en:'medium'},name:{cs:'Krémová indická zeleninová korma',en:'Creamy Indian Vegetable Korma'},desc:{cs:'Bohatá kari omáčka s kokosovým mlékem, jogurtem a kešu',en:'Rich curry sauce with coconut milk, yogurt and cashews'},cat_l:{cs:'Indická kuchyně',en:'Indian Cuisine'},ing:{cs:[{s:'Pro sauce',i:['3 stroužky česneku','1 jalapeño pepř, osetý','¼ šálku surových kešu','1 kus zázvoru (2,5 cm)','1 střední žlutá cibule']},{s:'Pro korma',i:['2 malá rajčata, na kostičky','1½ lžičky hnědého cukru','1 lžíce oleje','1 střední brambor na kostičky','1 šálek zelených fazolků','1 šálek zmrazeného hrášku a mrkve','¾ šálku jogurtu','½ šálku kokosového mléka','½ lžičky koriandru','⅛ lžičky kardamomu','½ lžičky černého pepře','½ lžičky soli','½ lžičky skořice','1 lžička garam masala','1 lžička kurkumy','2 lžičky kari']}],en:[{s:'For the sauce',i:['3 garlic cloves','1 jalapeño, seeded','¼ cup raw cashews','1 inch ginger','1 medium yellow onion']},{s:'For the korma',i:['2 small tomatoes, diced','1½ tsp brown sugar','1 tbsp oil','1 medium waxy potato, diced','1 cup green beans','1 cup frozen peas and carrots','¾ cup plain yogurt','½ cup coconut milk','½ tsp coriander','⅛ tsp cardamom','½ tsp black pepper','½ tsp salt','½ tsp cinnamon','1 tsp garam masala','1 tsp turmeric','2 tsp curry powder']}]},steps:{cs:['Cibuli, česnek, zázvor, jalapeño a kešu rozmixujte s ½ šálku vody do hladka.','Rozehřejte olej. Připravte koření do malé misky.','Nalijte pyré do pánve. Přidejte koření, vařte 2–3 min do vůně.','Přidejte rajčata, kokosové mléko, jogurt, cukr, brambory, hrášek a fazolky. Přikryjte, duste 10 min.','Odkryjte a vařte dalších 5–10 min. Podávejte s basmati rýží a naanem.'],en:['Blend onion, garlic, ginger, jalapeño and cashews with ½ cup water until smooth.','Heat oil over medium heat. Measure spices into a small bowl.','Pour purée into hot pan. Add spices, cook 2–3 min until fragrant.','Add tomatoes, coconut milk, yogurt, sugar, potato, peas and beans. Cover, simmer 10 min.','Uncover, cook 5–10 more min. Serve with basmati rice and naan.']}},
{id:2,cat:'indian',emoji:'🫘',time:'60 min',diff:{cs:'střední',en:'medium'},name:{cs:'Tarka Dal',en:'Tarka Dal'},desc:{cs:'Tradiční čočková polévka s aromatickým tarka přelitím a koriandrem',en:'Traditional lentil soup with aromatic tarka tempering and coriander'},cat_l:{cs:'Indická kuchyně',en:'Indian Cuisine'},ing:{cs:[{s:'',i:['250 g chana dal, propláchnutá','3 lžíce oleje','1 lžíce semínek kmínu','1 malá cibule, nakrájená','3–4 zelené chilli, napíchnuté','2 cm čerstvý zázvor, na proužky','3 stroužky česneku, vcelku','3 rajčata','¾ lžičky kurkumy','¾ lžičky garam masala','1½ lžičky mletého koriandru','hrst čerstvého koriandru','sůl a pepř']}],en:[{s:'',i:['250g chana dal, rinsed','3 tbsp oil','1 tbsp cumin seeds','1 small onion, chopped','3–4 green chillies, pierced','2 cm fresh ginger, julienned','3 garlic cloves, whole','3 tomatoes','¾ tsp turmeric','¾ tsp garam masala','1½ tsp ground coriander','handful fresh coriander','salt and black pepper']}]},steps:{cs:['Dal a 900 ml vody přiveďte k varu. Seberte pěnu, přikryjte a vařte 35–40 min.','Uvařený dal metličkou rozbijte na kaši. Odstavte.','Rozehřejte olej, přidejte kmín — 20–30 s do vůně.','Přidejte cibuli, chilli a zázvor, opékejte 4–5 min dozlatova.','Česnek a rajčata rozmixujte, přidejte do pánve s kořením a 100 ml vody. Vařte 15–20 min.','Přidejte dal, promíchejte, přiveďte k varu. Dochuťte.','Vmíchejte čerstvý koriandr.'],en:['Bring dal and 900ml water to the boil. Skim foam, cover, simmer 35–40 min.','Whisk cooked dal until smooth. Set aside.','Heat oil, add cumin seeds 20–30 s until fragrant.','Add onion, chilli and ginger, sauté 4–5 min until golden.','Blend garlic and tomatoes, add to pan with spices and 100ml water. Cook 15–20 min.','Add cooked dal, stir, bring to boil. Season.','Stir in fresh chopped coriander just before serving.']}},
{id:3,cat:'european',emoji:'🍄',time:'50 min',diff:{cs:'střední',en:'medium'},name:{cs:'Houbové Bourguignon',en:'Mushroom Bourguignon'},desc:{cs:'Vegetariánský francouzský klasik s Pinot Noir a česnekovou kaší',en:'Vegetarian French classic with Pinot Noir and silky garlic mash'},cat_l:{cs:'Francouzská kuchyně',en:'French Cuisine'},ing:{cs:[{s:'',i:['500 g hnědých žampionů, na čtvrtiny','3 mrkve, šikmá kolečka 1,5–2 cm','1 pórek nebo 2 šalotky','3 stroužky česneku, na plátky','200 ml suchého červeného vína (Pinot Noir)','400 ml zeleninového vývaru','1 lžíce rajčatového protlaku','tymián, bobkový list, sůl, pepř','1 lžíce hladké mouky','oříšek studeného másla']}],en:[{s:'',i:['500g brown mushrooms, quartered','3 carrots, sliced diagonally 1.5–2 cm','1 leek or 2 shallots','3 garlic cloves, sliced','200ml dry red wine (Pinot Noir)','400ml vegetable stock','1 tbsp tomato paste','thyme, bay leaf, salt, pepper','1 tbsp plain flour','knob of cold butter']}]},steps:{cs:['Na silném plameni opečte žampiony v jedné vrstvě bez solení dozhnědnutí. Vyjměte.','Snižte teplotu, přidejte pórek a mrkev, restujte 5 min.','Přidejte česnek a protlak, restujte 30–60 s.','Zaprašte moukou, zalijte vínem. Seškrábejte přípečky. Odpařte na polovinu.','Přilijte vývar, přidejte bylinky a houby. Duste pod pokličkou 20–25 min.','Vmíchejte oříšek studeného másla do lesku.'],en:['Sear mushrooms in one layer on high heat without salt until browned. Remove.','Reduce heat, add leek and carrots, sauté 5 min.','Add garlic and tomato paste, sauté 30–60 s.','Dust with flour, pour in wine. Scrape up bits. Reduce by half.','Add stock, herbs and mushrooms. Simmer covered 20–25 min.','Stir in cold butter until sauce turns glossy.']},tip:{cs:'Podávejte s bramborovou kaší: ohřejte mléko s rozmáčknutým česnekem a tymiánem, sceďte, vmíchejte do brambor s máslem.',en:'Serve with garlic mash: heat milk with crushed garlic and thyme, strain, whip into boiled potatoes with butter.'}},
{id:4,cat:'european',emoji:'🧀',time:'35 min',diff:{cs:'snadné',en:'easy'},name:{cs:'Pečené Halloumi s cizrnou a medocitronovým dresinkem',en:'Baked Halloumi with Chickpeas & Honey-Lemon Dressing'},desc:{cs:'Zlatavý halloumi, křupavá cizrna, cherry rajčata, lehký dresink',en:'Golden halloumi, crispy chickpeas, cherry tomatoes, light dressing'},cat_l:{cs:'Středomořská kuchyně',en:'Mediterranean'},ing:{cs:[{s:'Základ',i:['2 balení Halloumi, plátky 1,5 cm','1 plechovka cizrny — DŮKLADNĚ osušená','250 g cherry rajčat, celá','1 červená cibule, na měsíčky','olivový olej, sušené oregano, sůl, pepř']},{s:'Dresink',i:['3 lžíce olivového oleje','1 lžíce medu','šťáva z ½ citronu']}],en:[{s:'Base',i:['2 packs halloumi, sliced 1.5 cm','1 can chickpeas — THOROUGHLY dried','250g cherry tomatoes, whole','1 red onion, cut into wedges','olive oil, dried oregano, salt, pepper']},{s:'Dressing',i:['3 tbsp olive oil','1 tbsp honey','juice of ½ lemon']}]},steps:{cs:['Troubu předehřejte na 200 °C horkovzduch.','Na plech dejte cizrnu, rajčata a cibuli s olejem a oreganem. Pečte 15–20 min.','Poklaďte plátky halloumi. Pečte dalších 10–12 min (nebo gril 5 min) dozlatova.','Ihned po vytažení přelijte dresinkem.'],en:['Preheat oven to 200°C fan.','On a baking tray spread chickpeas, tomatoes and onion with oil and oregano. Roast 15–20 min.','Lay halloumi slices over vegetables. Return for 10–12 min (or grill 5 min) until golden.','Immediately drizzle with the honey-lemon dressing.']},tip:{cs:'Tortillu nakrájejte na trojúhelníky a opečte dozlatova — skvělé chipsy na nabírání.',en:'Cut tortilla into triangles and dry-toast until golden — great scooping chips.'}},
{id:5,cat:'indian',emoji:'🫙',time:'2 hod',diff:{cs:'náročné',en:'advanced'},name:{cs:'Punjabi Dal Makhani',en:'Punjabi Dal Makhani'},desc:{cs:'Hedvábný dal z urad čočky a fazolí s máslem a smetanou',en:'Silky dal from urad lentils and kidney beans with butter and cream'},cat_l:{cs:'Indická kuchyně',en:'Indian Cuisine'},ing:{cs:[{s:'',i:['¾ šálku (140 g) celé urad dal','¼ šálku (40 g) červených fazolí','1 cibule, jemně nakrájená','2 velká rajčata nebo 1 šálek pyré','2 lžičky zázvorovo-česnekové pasty','1 zelená paprika','3 lžíce másla','¼–⅓ šálku smetany','½ lžičky červeného chilli','½ lžičky kmínu','2–3 hřebíčky, 2–3 zelené kardamomy','1 černý kardamom, 1 palcová skořice','1 bobkový list','¼ lžičky kasuri methi','2–3 špetky muškátového oříšku','sůl dle chuti']}],en:[{s:'',i:['¾ cup (140g) whole urad dal','¼ cup (40g) kidney beans','1 onion, finely chopped','2 large tomatoes or 1 cup purée','2 tsp ginger-garlic paste','1 green chilli','3 tbsp butter','¼–⅓ cup cream','½ tsp red chilli powder','½ tsp cumin seeds','2–3 cloves, 2–3 green cardamoms','1 black cardamom, 1 inch cinnamon','1 bay leaf','¼ tsp kasuri methi','2–3 pinches nutmeg','salt to taste']}]},steps:{cs:['Dal a fazole namočte 8–9 hodin. Slijte.','Tlakový hrnec: 18–20 píšťalek. Normální hrnec: 45–60 min. Vše musí být měkké.','Rozehřejte máslo. Přidejte celé koření, restujte do vůně.','Přidejte cibuli, restujte dozlatova. Přidejte pastu a chilli.','Přidejte rajčatové pyré a muškát. Vařte dokud tuk nevystoupí.','Přidejte dal s 1 šálkem vody. Duste bez pokličky 25 min za míchání.','Vmíchejte smetanu a kasuri methi. Dochuťte. Podávejte s rýží.'],en:['Soak dal and beans 8–9 hours. Drain.','Pressure cook: 18–20 whistles. Pot: 45–60 min. Both must be very soft.','Heat butter. Add whole spices, sauté until aromatic.','Add onion, sauté until golden. Add paste and chilli.','Add tomato purée and nutmeg. Cook until fat separates.','Add dal with 1 cup water. Simmer uncovered 25 min, stirring often.','Stir in cream and kasuri methi. Season. Serve with rice.']}},
{id:6,cat:'european',emoji:'🎃',time:'75 min',diff:{cs:'střední',en:'medium'},name:{cs:'Vegetariánská svíčková z dýně',en:'Vegetarian Pumpkin Svíčková'},desc:{cs:'Česká klasika v rostlinném provedení — pečená hokkaido dýně, smetanová omáčka',en:'Czech classic reimagined — roasted hokkaido pumpkin, creamy sauce'},cat_l:{cs:'Česká kuchyně',en:'Czech Cuisine'},ing:{cs:[{s:'',i:['800 g dýně Hokkaido, neoloupaná, ~3 cm kostky','2 mrkve, 2 petržele, ½ celeru','3 velké žluté cibule','250 ml smetany ke šlehání (min. 31 %)','100 g ghí nebo řepkového oleje','1 citron — šťáva i kůra','1–2 lžíce plnotučné hořčice','ocet, 1–2 lžíce třtinového cukru','4 bobkové listy, 6 nové koření, 10 pepřů','špetka jedlé sody','zeleninový vývar ~1 litr','brusinky v gelu k servírování']}],en:[{s:'',i:['800g hokkaido pumpkin, unpeeled, ~3 cm cubes','2 carrots, 2 parsley roots, ½ celeriac','3 large yellow onions','250ml whipping cream (min. 31%)','100g ghee or rapeseed oil','1 lemon — juice and zest','1–2 tbsp full-fat mustard','vinegar, 1–2 tbsp cane sugar','4 bay leaves, 6 allspice, 10 peppercorns','pinch of baking soda','vegetable stock ~1 litre','cranberry jelly to serve']}]},steps:{cs:['Dýni v míse promíchejte s olejem a solí — každá kostka musí být obalená. Pečte na papíru na 200 °C, 20–30 min do zhnědnutí okrajů.','Restujte mrkev, celer a petržel v tuku do změny barvy.','Přidejte cibuli, karamelizujte s jedlou sodou a cukrem do tmavě hnědé. Přidejte lžíci octa.','Přidejte koření a hořčici, nechte krátce vypražit.','Přidejte dýni, zalijte vývarem. Vařte 15 min.','Vyjměte celé koření, rozmixujte dohladka. Přidejte smetanu, přiveďte k varu.','Dolaďte solí, citronem a octem. Podávejte s knedlíkem a brusinkami.'],en:['Toss pumpkin in a bowl with oil and salt — coat every cube. Roast on lined tray at 200°C for 20–30 min until edges brown.','Sauté carrots, celeriac and parsley root until they release colour.','Add onions, caramelise with baking soda and sugar to deep brown. Add a splash of vinegar.','Add spices and mustard, let mustard toast briefly.','Add pumpkin, cover with stock. Cook 15 min.','Remove whole spices and blend until smooth. Add cream, bring to boil.','Season with salt, lemon and vinegar. Serve with bread dumplings and cranberry jelly.']}},
{id:7,cat:'indian',emoji:'🟢',time:'40 min',diff:{cs:'střední',en:'medium'},name:{cs:'Matar Paneer',en:'Matar Paneer'},desc:{cs:'Čerstvý sýr paneer s hráškem v aromatické kešu-rajčatové masale',en:'Fresh paneer with peas in an aromatic cashew-tomato masala'},cat_l:{cs:'Indická kuchyně',en:'Indian Cuisine'},ing:{cs:[{s:'Masala pasta',i:['10–12 kešu, 1–2 zelené papriky','2–3 stroužky česneku','3 zralá rajčata','½ palce zázvoru, 1 střední cibule','2–3 hřebíčky, ½ palce skořice','1 lžička celého koriandru','4–5 celých černých pepřů','2 lžíce listů koriandru']},{s:'Matar paneer',i:['250–300 g paneer, na kostky','1 šálek hrášku','2–2,5 lžíce oleje nebo ghí','½ lžičky kmínu, ¼ lžičky kurkumy','¼–½ lžičky červeného chilli','¼–½ lžičky garam masala','½ lžičky cukru, sůl dle chuti','1 lžíce smetany (volitelně)','listy koriandru na ozdobu']}],en:[{s:'Masala paste',i:['10–12 cashews, 1–2 green chillies','2–3 garlic cloves','3 ripe tomatoes','½ inch ginger, 1 medium onion','2–3 cloves, ½ inch cinnamon','1 tsp coriander seeds','4–5 whole black peppercorns','2 tbsp coriander leaves']},{s:'Matar paneer',i:['250–300g paneer, cubed','1 cup peas (fresh or frozen)','2–2.5 tbsp oil or ghee','½ tsp cumin, ¼ tsp turmeric','¼–½ tsp red chilli','¼–½ tsp garam masala','½ tsp sugar, salt to taste','1 tbsp cream (optional)','coriander leaves to garnish']}]},steps:{cs:['Všechny ingredience na pastu rozmixujte dohladka bez vody.','Rozehřejte olej, přidejte kmín, nechte přeskočit.','Přidejte pastu, restujte 10–12 min, dokud se olej neoddělí.','Přidejte kurkumu, chilli a garam masala. Volitelně smetanu.','Přidejte hrášek, vodu a sůl. Vařte do měkka.','Přidejte paneer, duste 1–2 min. Nepřevařujte!','Ozdobte koriandrem. Podávejte s naanem nebo rýží.'],en:['Blend all paste ingredients until smooth — no water needed.','Heat oil, add cumin seeds, let them splutter.','Add paste, sauté 10–12 min on low until oil separates.','Add turmeric, chilli and garam masala. Optionally add cream.','Add peas, water and salt. Cook until soft.','Add paneer, simmer 1–2 min on low. Do not overcook!','Garnish with coriander. Serve with naan or rice.']}},
{id:8,cat:'european',emoji:'🥦',time:'45 min',diff:{cs:'snadné',en:'easy'},name:{cs:'Zapečená brabantská zelenina',en:'Belgian-Style Vegetable Gratin'},desc:{cs:'Květák a brambory zapečené s ricottou, vejci a trojitou sýrovou krustou',en:'Cauliflower and potato bake with ricotta, eggs and a triple-cheese crust'},cat_l:{cs:'Evropská kuchyně',en:'European Cuisine'},ing:{cs:[{s:'Pro 4–5 osob',i:['2 větší květáky (nebo 1 + 1 kg brokolice)','1,2 kg brambor, na 1 cm plátky','2 × 250 g Ricotta','8 vajec','500 ml smetany 31–33 %','300 g Gouda nebo Eidam','100 g Niva nebo modrý sýr','150 g Mozzarella na strouhání','sůl, pepř, hodně muškátového oříšku','3 stroužky česneku','máslo a strouhanka na formu']}],en:[{s:'Serves 4–5',i:['2 large cauliflowers (or 1 + 1 kg broccoli)','1.2 kg potatoes, sliced 1 cm','2 × 250g ricotta','8 eggs','500ml cream 31–33%','300g Gouda or Edam','100g blue cheese','150g mozzarella (grating type)','salt, pepper, plenty of nutmeg','3 garlic cloves','butter and breadcrumbs for the dish']}]},steps:{cs:['Brambory vařte 8 min, přidejte květák, vařte 5 min. Sceďte a nechte 2–3 min vydýchat.','Rozmačkejte Ricottu s vejci do hladka, pak přilévejte smetanu. Přidejte česnek, sůl, pepř a muškát.','Pekáč vymažte máslem a vysypejte strouhankou.','Promíchejte zeleninu v pekáči. Zalijte směsí. Zasypejte sýry (350–400 g).','Pečte na 180 °C horkovzduch 30–35 min do zlatohnědé bublinky.'],en:['Cook potatoes 8 min, add cauliflower, cook 5 more min. Drain and steam-dry 2–3 min.','Mash ricotta with eggs until smooth, then add cream. Add garlic, salt, pepper and nutmeg.','Butter the dish and coat with breadcrumbs.','Mix vegetables in the dish. Pour over cream mixture. Top with cheeses (350–400 g).','Bake at 180°C fan 30–35 min until golden and bubbly.']},tip:{cs:'Zamíchej do smetany lžíci plnotučné hořčice pro ještě výraznější chuť.',en:'Stir a tablespoon of full-fat mustard into the cream for extra punch.'}},
{id:9,cat:'indian',emoji:'🍚',time:'25 min',diff:{cs:'snadné',en:'easy'},name:{cs:'Rádžasthánská rýže s rozinkami',en:'Rajasthani Spiced Rice with Raisins'},desc:{cs:'Tradiční jídlo z Rádžasthánu — kari rýže s brambory, hráškem a sladkými rozinkami',en:'Traditional Rajasthan dish — spiced rice with potatoes, peas and sweet raisins'},cat_l:{cs:'Indická kuchyně',en:'Indian Cuisine'},ing:{cs:[{s:'',i:['280 g rýže — propláchnutá 10× dokud voda není čirá!','4 menší brambory, na kostky','2 malé cibule','6 malých rajčat, nakrájených','hrst světlých rozinek','2–3 lžíce hrášku','2,5 lžičky kari koření','1 lžička chilli, 1,5 lžičky soli','zarovnaná lžička kmínu','voda — dvojnásobek objemu rýže']}],en:[{s:'',i:['280g rice — rinsed 10 times until water runs clear!','4 small potatoes, cubed','2 small onions','6 small tomatoes, chopped','handful of light raisins','2–3 tbsp peas','2.5 tsp curry powder','1 tsp chilli, 1.5 tsp salt','1 level tsp cumin','water — double the volume of rice']}]},steps:{cs:['V rozpáleném tuku restujte kmín půl minuty.','Přidejte kari, chilli a sůl, po pár sekundách zalijte vodou.','Přidejte hrášek, cibulku a brambory, přiveďte do varu.','Přidejte propláchnutou rýži. Přikryjte, vařte ~10 min. Neodkrývat!','Po vyvaření vody vypněte. Pod pokličku přihoďte rajčata a rozinky, přikryjte na 2 min.'],en:['In hot fat, fry cumin seeds for half a minute.','Add curry, chilli and salt, stir, then add water.','Add peas, onion and potatoes, bring to boil.','Add rinsed rice. Cover and cook ~10 min. Do not lift lid!','Once water absorbed, turn off heat. Add tomatoes and raisins under lid, cover 2 min.']}},
{id:10,cat:'dessert',emoji:'🥛',time:'50 min',diff:{cs:'snadné',en:'easy'},name:{cs:'Rýžový kheer (Chawal ki Kheer)',en:'Rice Kheer (Chawal ki Kheer)'},desc:{cs:'Tradiční indický rýžový dezert s kardamomem a šafránem',en:'Traditional Indian rice pudding with cardamom and saffron'},cat_l:{cs:'Indický dezert',en:'Indian Dessert'},ing:{cs:[{s:'4 porce',i:['1 litr plnotučného mléka','70 g bílé rýže (nejlépe basmati)','70–80 g cukru dle chuti','3–4 zelené kardamomové tobolky','špetka šafránu (volitelně)','2 lžíce nasekaných mandlí nebo pistácií']}],en:[{s:'Serves 4',i:['1 litre whole milk','70g white rice (basmati preferred)','70–80g sugar to taste','3–4 green cardamom pods','pinch of saffron (optional)','2 tbsp chopped almonds or pistachios']}]},steps:{cs:['Rýži propláchni, dokud není voda čirá.','Mléko přiveď k varu, přidej rozmáčknuté kardamomové tobolky.','Přidej rýži, ztlum plamen. Vař pomalu 35–40 min za častého míchání.','Vmíchej cukr a volitelně šafrán. Nech 5 min prolnout chutě.','Posyp oříšky. Podávej teplý nebo vychlazeně ze lednice.','Studený chutná krémověji. Variace: vmíchej čerstvé ovoce po vychladnutí.'],en:['Rinse rice until water runs clear.','Bring milk to the boil, add lightly crushed cardamom pods.','Add rice, reduce heat. Simmer gently 35–40 min, stirring frequently.','Stir in sugar and optionally saffron. Cook 5 more min.','Sprinkle with nuts. Serve warm or well chilled.','Chilled version tastes creamier. Variation: fold in fresh fruit once cooled.']},tip:{cs:'Základ je vždy stejný — mléko, rýže, kardamom, cukr. Ovoce přidávej vždy až do VYCHLAZENÉHO základu. 🍊 Pomeranč: vyfiletuj, zbav bílé slupky, přidej těsně před podáváním. 🍌 Banán: rozmačkej nebo rozmixuj 1–2 banány, vmíchej do studeného základu. 🍎 Jablko: nastrouhej (Gala, Fuji), krátce poduš na másle se skořicí, vychlaď a vmíchej. 🍓 Jahody: rozmixuj s trochou cukru, lehce vmíchej těsně před servírováním.',en:'The base is always the same — milk, rice, cardamom, sugar. Always add fruit to the COOLED base. 🍊 Orange: fillet, remove white pith, add just before serving. 🍌 Banana: mash or blend 1–2 bananas into the cold base. 🍎 Apple: grate (Gala, Fuji), briefly cook with butter and cinnamon, cool then fold in. 🍓 Strawberry: blend with a little sugar, fold in just before serving.'}},
{id:11,cat:'european',emoji:'🍝',time:'40 min',diff:{cs:'střední',en:'medium'},name:{cs:'Čočkové boloňské (Beluga)',en:'Lentil Bolognese (Beluga)'},desc:{cs:'Hluboká chuť díky redukci červeného vína a černé čočce, která drží strukturu',en:'Deep flavour from red wine reduction and black lentils that hold their shape'},cat_l:{cs:'Italská kuchyně',en:'Italian Cuisine'},ing:{cs:[{s:'Pro 5 osob',i:['400 g černé čočky Beluga','2 × 400 g drcených rajčat','2 mrkve, 2 řapíkaté celerové stonky, 1 cibule','200 ml suchého červeného vína','500 ml zeleninového vývaru','2 lžíce rajčatového protlaku','750 g špaget','parmazán k servírování','olivový olej, sůl, pepř']}],en:[{s:'Serves 5',i:['400g Beluga lentils','2 × 400g crushed tomatoes','2 carrots, 2 celery stalks, 1 onion','200ml dry red wine','500ml vegetable stock','2 tbsp tomato paste','750g spaghetti','parmesan to serve','olive oil, salt, pepper']}]},steps:{cs:['Zeleninu (soffritto: mrkev, celer, cibule) restujte na olivovém oleji na středním plameni minimálně 10 minut — musí zhnědnout, ne jen změknout.','Přidejte rajčatový protlak a nechte ho 1–2 minuty karamelizovat přímo na dno pánve — odstraní kyselost a přidá hloubku.','Zalijte vínem a vyredukujte na polovinu (asi 3–4 minuty). Seškrábejte přípečky ode dna.','Přidejte čočku, drcená rajčata a vývar. Vařte bez pokličky 20–25 minut, dokud omáčka nezhoustne a čočka není al dente.','Dochuťte solí a pepřem. Podávejte se špagetami a parmazánem.'],en:['Sauté soffritto (carrot, celery, onion) in olive oil on medium heat for at least 10 minutes until properly browned, not just softened.','Add tomato paste and let it caramelise on the pan base for 1–2 minutes — removes acidity and adds depth.','Pour in wine and reduce by half (3–4 minutes). Scrape up any bits from the bottom.','Add lentils, crushed tomatoes and stock. Simmer uncovered 20–25 minutes until sauce is thick and lentils are al dente.','Season with salt and pepper. Serve with spaghetti and parmesan.']},tip:{cs:'Beluga čočka drží tvar i po uvaření — ideální pro boloňské. Zelená nebo hnědá čočka se rozkašovatí.',en:'Beluga lentils hold their shape after cooking — ideal for bolognese. Green or brown lentils turn mushy.'}},
{id:12,cat:'basics',emoji:'🫕',time:'90 min',diff:{cs:'snadné',en:'easy'},name:{cs:'Pečený zeleninový vývar',en:'Roasted Vegetable Stock'},desc:{cs:'Tmavý, průhledný a chuťově hluboký vývar z pečené zeleniny — základ pro bourguignon, svíčkovou i polévky',en:'Dark, clear and deeply flavourful stock from roasted vegetables — base for bourguignon, svíčková and soups'},cat_l:{cs:'Základy kuchyně',en:'Kitchen Basics'},ing:{cs:[{s:'Na pečení (plech)',i:['Mrkev — nakrájená na kostičky','Petržel (kořen) — nakrájená na kostičky','Celer — nejvíce, základ vývaru','Lilek — přidá umami a hloubku','Olivový olej na promíchání']},{s:'Do hrnce',i:['Strouhaná mrkev + petržel (na osmažení na ghí)','Malinko hladké mouky (zahustí a emulguje)','Celá cibule ve slupce (dá barvu!!)','Nové koření — 5–6 kuliček','Bobkový list — 2 ks','Studená voda — cca 2 litry']}],en:[{s:'For roasting (tray)',i:['Carrots — diced','Parsley root — diced','Celeriac — the most, forms the base','Aubergine — adds umami and depth','Olive oil to coat']},{s:'Into the pot',i:['Grated carrot + parsley root (sautéed in ghee)','Small amount of plain flour (thickens and emulsifies)','Whole onion with skin (gives colour!)','Allspice — 5–6 berries','Bay leaf — 2 pcs','Cold water — approx 2 litres']}]},steps:{cs:['Zeleninu (mrkev, petržel, celer, lilek) nakrájej na kostičky. V míse důkladně promíchej s olejem — každý kousek musí být obalený. Rozlož na plech v jedné vrstvě.','Peč na 180 °C horkovzduch 35 minut, dokud zelenina pořádně nezhnědne. Tohle je základ chuti — nespěchej.','Mezitím nastrouhej mrkev a petržel, osmaž na ghí dokud nepustí barvu. Přidej malinko mouky (max 1 lžíce ať je vývar průhledný) a krátce promíchej — vznikne aromatický základ.','Do hrnce přidej základ z ghí (osmaženou mrkev a petržel s moukou), zalij studenou vodou, přidej celou cibuli ve slupce — ta dá vývaru tmavou barvu — nové koření a bobkový list.','Přiveď k varu, přidej upečenou zeleninu z plechu. Stáhni plamen na minimum — vývar musí jen malino probublávat, ne divoce vařit (jinak se zakalí).','Nech vývar vařit 30 minut na nejnižším plameni. Poté sceď přes jemné sítko. Výsledek: tmavý, průhledný a aromatický vývar.'],en:['Dice the vegetables (carrot, parsley root, celeriac, aubergine). Thoroughly toss with oil in a bowl — every piece must be coated. Spread on a tray in one layer.','Roast at 180°C fan for 35 minutes until properly browned. This is where the flavour is built — do not rush.','Meanwhile grate carrot and parsley root, sauté briefly in ghee until they release their colour. Add a small amount of flour (max 1 tbsp) and stir briefly — this forms the aromatic base.','Add the ghee base (sautéed grated carrot and parsley with flour) to a pot, cover with cold water. Add the whole onion with skin on — it gives the stock its dark colour — allspice and bay leaf.','Bring to the boil, then add the roasted vegetables from the tray. Reduce to the lowest heat — the stock must just barely bubble, never boil hard (or it will go cloudy).','Leave to simmer for about 30 minutes on the lowest heat. Strain through a fine sieve. Result: dark, clear and deeply aromatic stock.']},tip:{cs:'Přidej lžíci rajčatového protlaku přímo na zeleninu před pečením — zkaramelizuje a přidá další vrstvu chuti.',en:'Add a tablespoon of tomato paste directly onto the vegetables before roasting — it caramelises and adds another flavour layer.'}},
{id:13,cat:'technique',emoji:'🔥',time:'5 min čtení',diff:{cs:'klíčová technika',en:'key technique'},name:{cs:'Maillardova reakce',en:'The Maillard Reaction'},desc:{cs:'Proč pečení zeleniny změní vše — stovky nových aromatických sloučenin, koncentrace chuti a základ celé vegetariánské kuchyně',en:'Why roasting vegetables changes everything — hundreds of new aromatic compounds, concentrated flavour and the foundation of vegetarian cooking'},cat_l:{cs:'Technika vaření',en:'Cooking Technique'},ing:{cs:[{s:'4 pravidla',i:['Sucho a prostor — zelenina nesmí být mokrá ani naskládaná na sobě','Teplota 180–220 °C horkovzduch — pod 160 °C reakce neprobíhá','Olej na každý kousek — promíchej v míse, ne jen zakápni','Trpělivost — 25–40 minut, okraje musí zhnědnout']}],en:[{s:'4 rules',i:['Dry and spaced — vegetables must not be wet or piled on each other','Temperature 180–220°C fan — below 160°C the reaction does not occur','Oil on every piece — toss in a bowl, do not just drizzle','Patience — 25–40 minutes, edges must brown']}]},steps:{cs:['Maso má přirozené výhody — tuk, kolagen, kostní vývar. Zelenina nic z toho nemá. Pokud ji jen uvaříš nebo dusíš, zůstaneš na povrchu.','Pečením nad 160 °C se spustí dva klíčové procesy: Maillardova reakce (aminokyseliny + cukry → stovky aromatických sloučenin) a karamelizace (přirozené cukry se transformují na komplexní hořkosladké tóny).','Navíc se odpaří voda — chuť se koncentruje 3–5×. Syrová mrkev chutná jako mrkev. Pečená mrkev chutná jako něco úplně jiného.','Prakticky: zeleninu nakrájej na stejně velké kousky, v míse důkladně promíchej s olejem (každý kousek musí být obalený), rozlož v jedné vrstvě na plech.','Peč na 180–220 °C dokud okraje nezhnědnou — ne zčernají, zhnědnou. Tohle je ta chvíle kdy vzniká hloubka chuti.','Vaření zeleniny dělá jídlo. Pečení zeleniny dělá chuť.'],en:['Meat has natural advantages — fat, collagen, bone stock. Vegetables have none of that. If you just boil or braise them, you stay on the surface.','Roasting above 160°C triggers two key processes: the Maillard reaction (amino acids + sugars → hundreds of aromatic compounds) and caramelisation (natural sugars transform into complex bittersweet tones).','Water also evaporates — flavour concentrates 3–5×. Raw carrot tastes like carrot. Roasted carrot tastes like something entirely different.','Practically: cut vegetables into equal-sized pieces, thoroughly toss with oil in a bowl (every piece must be coated), spread in one layer on a hot tray.','Roast at 180–220°C until edges brown — not blacken, brown. This is the moment when depth of flavour is created.','Boiling vegetables makes food. Roasting vegetables makes flavour.']}}
];

const T={
  cs:{badge:'🥬 Ověřené recepty',title:'<em>Vegetariánské</em> recepty',sub:'Naše oblíbená rodinná jídla z celého světa',placeholder:'Hledat recept…',cntLbl:'receptů',logo:'🌿 <span class="a">Naše</span> recepty',filters:{all:'Vše',indian:'🇮🇳 Indická',european:'🇪🇺 Evropská',basics:'🫕 Základy',dessert:'🍮 Dezerty',technique:'🔥 Techniky'},ing:'Suroviny',steps:'Postup',tip:'💡 Tip',noRes:'Žádné recepty neodpovídají vyhledávání.',footer:'Naše oblíbené vegetariánské recepty · Vždy dostupné',readMore:'Přečíst více →'},
  en:{badge:'🥬 Tried & tested',title:'<em>Vegetarian</em> Recipes',sub:'Our favourite family dishes from around the world',placeholder:'Search recipes…',cntLbl:'recipes',logo:'🌿 <span class="a">Our</span> Recipes',filters:{all:'All',indian:'🇮🇳 Indian',european:'🇪🇺 European',basics:'🫕 Basics',dessert:'🍮 Desserts',technique:'🔥 Techniques'},ing:'Ingredients',steps:'Method',tip:'💡 Tip',noRes:'No recipes match your search.',footer:'Our favourite vegetarian recipes · Always available',readMore:'Read more →'}
};

let lang='cs', filt='all';

function setLang(l){
  lang=l;
  document.getElementById('btn-cs').classList.toggle('on',l==='cs');
  document.getElementById('btn-en').classList.toggle('on',l==='en');
  const t=T[l];
  document.getElementById('hero-badge').textContent=t.badge;
  document.getElementById('hero-title').innerHTML=t.title;
  document.getElementById('hero-sub').textContent=t.sub;
  document.getElementById('search').placeholder=t.placeholder;
  document.getElementById('cnt-lbl').textContent=t.cntLbl;
  document.getElementById('logo').innerHTML=t.logo;
  document.getElementById('footer-txt').textContent=t.footer;
  document.querySelectorAll('.fb').forEach(b=>{
    const f=b.getAttribute('data-f');
    if(t.filters[f]) b.textContent=t.filters[f];
  });
  render();
}

function setF(f,btn){
  filt=f;
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  render();
}

const MAILLARD_ID = 13;

function render(){
  const q=document.getElementById('search').value.toLowerCase().trim();
  const featuredSlot=document.getElementById('featured-slot');
  const grid=document.getElementById('grid');
  const t=T[lang];

  // Filter all recipes
  let list=R.filter(r=>{
    const fOk=filt==='all'||r.cat===filt;
    const qOk=!q||r.name.cs.toLowerCase().includes(q)||r.name.en.toLowerCase().includes(q)||r.desc.cs.toLowerCase().includes(q)||r.desc.en.toLowerCase().includes(q);
    return fOk&&qOk;
  });

  // Maillard gets featured slot when filter=all and no search query
  const maillard=R.find(r=>r.id===MAILLARD_ID);
  const showFeatured=(filt==='all'||filt==='technique')&&!q&&maillard;
  const gridList=showFeatured?list.filter(r=>r.id!==MAILLARD_ID):list;

  document.getElementById('cnt-n').textContent=list.length;

  // Featured card
  if(showFeatured&&maillard){
    featuredSlot.innerHTML=`
      <div class="featured-card" onclick="openM(${maillard.id})" role="button" tabindex="0"
           onkeydown="if(event.key==='Enter')openM(${maillard.id})">
        <div class="fc-left">
          <div class="fc-label">${maillard.cat_l[lang]}</div>
          <div class="fc-title">${maillard.name[lang]}</div>
          <div class="fc-desc">${maillard.desc[lang]}</div>
          <div class="fc-meta">
            <span>⏱ ${maillard.time}</span>
            <span>◎ ${maillard.diff[lang]}</span>
          </div>
          <div class="fc-cta">${t.readMore}</div>
        </div>
        <div class="fc-emoji">${maillard.emoji}</div>
      </div>`;
  } else {
    featuredSlot.innerHTML='';
  }

  // Grid
  if(!gridList.length){
    grid.innerHTML=`<div class="empty"><div class="icon">🔍</div>${t.noRes}</div>`;
    return;
  }
  grid.innerHTML=gridList.map((r,i)=>`
    <article class="card" data-cat="${r.cat}" onclick="openM(${r.id})" role="button" tabindex="0"
             onkeydown="if(event.key==='Enter')openM(${r.id})" style="animation-delay:${Math.min(i,6)*0.05}s">
      <span class="card-emoji">${r.emoji}</span>
      <div class="card-cat">${r.cat_l[lang]}</div>
      <div class="card-name">${r.name[lang]}</div>
      <div class="card-desc">${r.desc[lang]}</div>
      <div class="card-meta"><span>⏱ ${r.time}</span><span>◎ ${r.diff[lang]}</span></div>
    </article>`).join('');
}

function openM(id){
  const r=R.find(x=>x.id===id);
  if(!r)return;
  const t=T[lang];
  document.getElementById('m-emoji').textContent=r.emoji;
  document.getElementById('m-cat').textContent=r.cat_l[lang];
  document.getElementById('m-name').textContent=r.name[lang];
  document.getElementById('m-desc').textContent=r.desc[lang];
  document.getElementById('m-meta').innerHTML=`<span>⏱ ${r.time}</span><span style="margin-left:4px">◎ ${r.diff[lang]}</span>`;
  let html='';
  if(r.ing){
    html+=`<div class="sec-ttl">${t.ing}</div>`;
    const ingSecs=r.ing[lang]||r.ing.cs||[];
    ingSecs.forEach(sec=>{
      if(sec.s)html+=`<div class="sub-lbl">${sec.s}</div>`;
      html+=`<ul class="ing-list">${sec.i.map(x=>`<li><span class="dot"></span>${x}</li>`).join('')}</ul>`;
    });
  }
  html+=`<div class="sec-ttl">${t.steps}</div><ol class="steps-list">`;
  (r.steps[lang]||r.steps.cs).forEach((s,i)=>{
    html+=`<li><span class="sn">${i+1}</span><span>${s}</span></li>`;
  });
  html+=`</ol>`;
  if(r.tip){html+=`<div class="sec-ttl">${t.tip}</div><div class="tip-box">${(r.tip[lang]||r.tip.cs)}</div>`;}
  document.getElementById('m-body').innerHTML=html;
  document.getElementById('overlay').classList.add('open');
  document.getElementById('overlay').querySelector('.modal').scrollTop=0;
  document.body.style.overflow='hidden';
}

function closeM(){document.getElementById('overlay').classList.remove('open');document.body.style.overflow='';}
function overlayClick(e){if(e.target===document.getElementById('overlay'))closeM();}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeM();});
render();
</script>
</body>
</html>
