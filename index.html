<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌿 Vegetariánské recepty</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">

  <style>
    :root {
      --glass-bg: rgba(255,255,255,0.06);
      --glass-bg-md: rgba(255,255,255,0.09);
      --glass-bg-lg: rgba(255,255,255,0.13);
      --glass-border: rgba(255,255,255,0.11);
      --glass-border-lg: rgba(255,255,255,0.18);
      --glass-shine: rgba(255,255,255,0.22);
      --blur-sm: 16px;
      --blur-md: 28px;
      --blur-lg: 48px;
      --radius: 26px;
      --radius-sm: 16px;
      --radius-full: 100px;
      --accent: #f4a261;
      --accent-dim: rgba(244,162,97,0.28);
      --accent-glow: rgba(244,162,97,0.18);
      --text: #f2ede7;
      --text-muted: rgba(242,237,231,0.52);
      --text-subtle: rgba(242,237,231,0.32);
      --bg: #060410;
      --header-bg: rgba(6,4,16,0.72);
      --modal-bg: rgba(10,7,22,0.94);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── BACKGROUND ORBS ────────────────────────────────── */

    .bg-stage {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      will-change: transform;
    }

    .orb-1 {
      width: 700px; height: 700px;
      background: radial-gradient(circle, #7c3aed 0%, #4c1d95 60%, transparent 100%);
      top: -250px; left: -180px;
      opacity: 0.4;
      animation: drift1 28s ease-in-out infinite alternate;
    }
    .orb-2 {
      width: 550px; height: 550px;
      background: radial-gradient(circle, #ea580c 0%, #9a3412 60%, transparent 100%);
      top: 10%; right: -150px;
      opacity: 0.35;
      animation: drift2 22s ease-in-out infinite alternate;
    }
    .orb-3 {
      width: 480px; height: 480px;
      background: radial-gradient(circle, #0284c7 0%, #075985 60%, transparent 100%);
      bottom: 5%; left: 15%;
      opacity: 0.3;
      animation: drift3 32s ease-in-out infinite alternate;
    }
    .orb-4 {
      width: 380px; height: 380px;
      background: radial-gradient(circle, #059669 0%, #064e3b 60%, transparent 100%);
      bottom: 0; right: 10%;
      opacity: 0.3;
      animation: drift1 18s ease-in-out infinite alternate;
    }
    .orb-5 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, #db2777 0%, transparent 100%);
      top: 45%; left: 45%;
      opacity: 0.18;
      animation: drift2 24s ease-in-out infinite alternate;
    }

    @keyframes drift1 {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(70px, 50px) scale(1.12); }
    }
    @keyframes drift2 {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(-60px, 70px) scale(0.92); }
    }
    @keyframes drift3 {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(50px, -60px) scale(1.08); }
    }

    /* Noise grain overlay */
    .bg-stage::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.028;
    }

    /* ── LAYOUT ─────────────────────────────────────────── */

    .z1 { position: relative; z-index: 1; }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 28px;
    }

    /* ── HEADER ─────────────────────────────────────────── */

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(var(--blur-md)) saturate(160%);
      -webkit-backdrop-filter: blur(var(--blur-md)) saturate(160%);
      background: var(--header-bg);
      border-bottom: 1px solid var(--glass-border);
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px 28px;
      max-width: 1200px;
      margin: 0 auto;
      gap: 16px;
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.35rem;
      font-weight: 500;
      letter-spacing: 0.01em;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .logo .accent { color: var(--accent); }

    /* ── LANG TOGGLE ────────────────────────────────────── */

    .lang-toggle {
      display: flex;
      gap: 3px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-full);
      padding: 4px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .lang-toggle button {
      background: none;
      border: none;
      color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      padding: 6px 15px;
      border-radius: var(--radius-full);
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .lang-toggle button.active {
      background: var(--glass-shine);
      color: var(--text);
      box-shadow: 0 1px 6px rgba(0,0,0,0.25);
    }

    /* ── HERO ───────────────────────────────────────────── */

    .hero {
      padding: 90px 0 52px;
      text-align: center;
    }

    .hero-label {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-glow);
      border: 1px solid var(--accent-dim);
      border-radius: var(--radius-full);
      padding: 5px 16px;
      margin-bottom: 24px;
    }

    .hero h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.8rem, 7vw, 5.5rem);
      font-weight: 300;
      line-height: 1.08;
      margin-bottom: 16px;
      letter-spacing: -0.01em;
    }

    .hero h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .hero-sub {
      color: var(--text-muted);
      font-size: 1.05rem;
      font-weight: 300;
      margin-bottom: 44px;
      letter-spacing: 0.01em;
    }

    /* ── SEARCH ─────────────────────────────────────────── */

    .search-wrap {
      max-width: 580px;
      margin: 0 auto;
      position: relative;
    }

    .search-wrap input {
      width: 100%;
      background: var(--glass-bg-md);
      backdrop-filter: blur(var(--blur-md));
      -webkit-backdrop-filter: blur(var(--blur-md));
      border: 1px solid var(--glass-border-lg);
      border-radius: var(--radius-full);
      padding: 17px 56px 17px 26px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
    }

    .search-wrap input::placeholder { color: var(--text-subtle); }

    .search-wrap input:focus {
      border-color: var(--accent);
      background: rgba(255,255,255,0.11);
      box-shadow: 0 0 0 4px var(--accent-glow);
    }

    .search-icon {
      position: absolute;
      right: 22px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-subtle);
      font-size: 1.25rem;
      pointer-events: none;
      transition: color 0.2s;
    }

    .search-wrap input:focus + .search-icon { color: var(--accent); }

    /* ── FILTERS ────────────────────────────────────────── */

    .filters {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      padding: 32px 0 44px;
    }

    .filter-btn {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-full);
      padding: 9px 22px;
      color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      font-weight: 400;
      cursor: pointer;
      transition: all 0.22s;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .filter-btn:hover {
      background: var(--glass-bg-md);
      border-color: var(--glass-border-lg);
      color: var(--text);
    }

    .filter-btn.active {
      background: var(--accent-dim);
      border-color: rgba(244,162,97,0.45);
      color: var(--accent);
    }

    /* ── RECIPE GRID ────────────────────────────────────── */

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
      gap: 18px;
      padding-bottom: 100px;
    }

    /* ── RECIPE CARD ────────────────────────────────────── */

    .recipe-card {
      background: var(--glass-bg);
      backdrop-filter: blur(var(--blur-md));
      -webkit-backdrop-filter: blur(var(--blur-md));
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 30px;
      cursor: pointer;
      transition: transform 0.32s cubic-bezier(0.34,1.56,0.64,1), background 0.22s, border-color 0.22s, box-shadow 0.32s;
      position: relative;
      overflow: hidden;
    }

    /* Top gloss line */
    .recipe-card::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--glass-shine) 40%, var(--glass-shine) 60%, transparent);
      border-radius: 1px;
    }

    /* Inner subtle glow on hover */
    .recipe-card::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: var(--radius);
      opacity: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(244,162,97,0.08) 0%, transparent 70%);
      transition: opacity 0.3s;
    }

    .recipe-card:hover {
      transform: translateY(-5px) scale(1.008);
      background: var(--glass-bg-md);
      border-color: rgba(255,255,255,0.17);
      box-shadow: 0 24px 64px rgba(0,0,0,0.45), 0 4px 16px rgba(0,0,0,0.3), inset 0 1px 0 var(--glass-shine);
    }

    .recipe-card:hover::after { opacity: 1; }

    .card-emoji {
      font-size: 2.6rem;
      display: block;
      margin-bottom: 18px;
      line-height: 1;
    }

    .card-cat {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .card-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.55rem;
      font-weight: 500;
      line-height: 1.22;
      margin-bottom: 12px;
    }

    .card-desc {
      color: var(--text-muted);
      font-size: 0.88rem;
      font-weight: 300;
      line-height: 1.65;
      margin-bottom: 22px;
    }

    .card-meta {
      display: flex;
      gap: 18px;
      font-size: 0.78rem;
      color: var(--text-subtle);
      letter-spacing: 0.02em;
    }

    .card-meta span { display: flex; align-items: center; gap: 5px; }

    /* ── MODAL ──────────────────────────────────────────── */

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(10px) saturate(120%);
      -webkit-backdrop-filter: blur(10px) saturate(120%);
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--modal-bg);
      backdrop-filter: blur(var(--blur-lg)) saturate(180%);
      -webkit-backdrop-filter: blur(var(--blur-lg)) saturate(180%);
      border: 1px solid var(--glass-border-lg);
      border-radius: 32px;
      max-width: 740px;
      width: 100%;
      max-height: 88vh;
      overflow-y: auto;
      position: relative;
      transform: scale(0.94) translateY(24px);
      transition: transform 0.35s cubic-bezier(0.34,1.3,0.64,1);
      box-shadow: 0 40px 120px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.14);
    }

    .modal-overlay.open .modal {
      transform: scale(1) translateY(0);
    }

    .modal-header {
      padding: 34px 34px 26px;
      border-bottom: 1px solid var(--glass-border);
      position: sticky;
      top: 0;
      background: rgba(10,7,22,0.96);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 32px 32px 0 0;
      z-index: 1;
    }

    .modal-close {
      position: absolute;
      top: 22px; right: 22px;
      background: var(--glass-bg-md);
      border: 1px solid var(--glass-border);
      border-radius: 50%;
      width: 38px; height: 38px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 1rem;
      transition: background 0.2s, color 0.2s;
      flex-shrink: 0;
    }

    .modal-close:hover { background: var(--glass-bg-lg); color: var(--text); }

    .modal-emoji { font-size: 2rem; display: block; margin-bottom: 10px; line-height: 1; }

    .modal-cat {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 7px;
    }

    .modal-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 500;
      line-height: 1.18;
      padding-right: 48px;
    }

    .modal-desc {
      color: var(--text-muted);
      font-size: 0.9rem;
      font-weight: 300;
      margin-top: 9px;
      line-height: 1.6;
    }

    .modal-meta {
      display: flex;
      gap: 16px;
      margin-top: 14px;
      font-size: 0.78rem;
      color: var(--text-subtle);
    }

    .modal-body { padding: 28px 34px 36px; }

    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem;
      font-weight: 500;
      color: var(--accent);
      margin: 28px 0 14px;
      padding-bottom: 9px;
      border-bottom: 1px solid var(--glass-border);
      letter-spacing: 0.01em;
    }

    .section-title:first-child { margin-top: 0; }

    .sub-label {
      font-size: 0.72rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-subtle);
      margin: 16px 0 8px;
    }

    .ing-list {
      list-style: none;
      display: grid;
      gap: 6px;
    }

    .ing-list li {
      padding: 9px 15px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      font-size: 0.88rem;
      font-weight: 300;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: background 0.18s;
    }

    .ing-list li:hover { background: var(--glass-bg-md); }

    .ing-dot {
      width: 5px; height: 5px;
      background: var(--accent);
      border-radius: 50%;
      flex-shrink: 0;
      opacity: 0.7;
    }

    .steps-list {
      list-style: none;
      display: grid;
      gap: 12px;
    }

    .steps-list li {
      padding: 16px 20px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 18px;
      font-size: 0.88rem;
      font-weight: 300;
      line-height: 1.72;
      display: grid;
      grid-template-columns: 32px 1fr;
      gap: 14px;
      align-items: start;
      transition: background 0.18s;
    }

    .steps-list li:hover { background: var(--glass-bg-md); }

    .step-num {
      background: var(--accent-dim);
      color: var(--accent);
      border-radius: 50%;
      width: 28px; height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.78rem;
      font-weight: 500;
      flex-shrink: 0;
      margin-top: 1px;
      border: 1px solid rgba(244,162,97,0.3);
    }

    .tip-box {
      background: var(--glass-bg);
      border: 1px solid rgba(244,162,97,0.22);
      border-radius: 18px;
      padding: 16px 20px;
      font-size: 0.88rem;
      font-weight: 300;
      line-height: 1.72;
      color: var(--text-muted);
    }

    /* Scrollbar */
    .modal::-webkit-scrollbar { width: 4px; }
    .modal::-webkit-scrollbar-track { background: transparent; }
    .modal::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 4px; }

    /* ── EMPTY / NO RESULTS ─────────────────────────────── */

    .no-results {
      grid-column: 1/-1;
      text-align: center;
      padding: 80px 24px;
      color: var(--text-muted);
      font-size: 1rem;
    }

    .no-results .nr-icon { font-size: 2.8rem; margin-bottom: 14px; }

    /* ── FOOTER ─────────────────────────────────────────── */

    footer {
      position: relative;
      z-index: 1;
      border-top: 1px solid var(--glass-border);
      padding: 24px 28px;
      text-align: center;
      color: var(--text-subtle);
      font-size: 0.82rem;
      backdrop-filter: blur(var(--blur-sm));
      -webkit-backdrop-filter: blur(var(--blur-sm));
      background: rgba(6,4,16,0.5);
    }

    /* ── COUNT BADGE ────────────────────────────────────── */
    .count-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--glass-bg-md);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-full);
      padding: 4px 14px;
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 12px;
    }

    /* ── RESPONSIVE ─────────────────────────────────────── */

    @media (max-width: 640px) {
      .container { padding: 0 16px; }
      .header-inner { padding: 14px 16px; }
      .hero { padding: 60px 0 36px; }
      .grid { grid-template-columns: 1fr; }
      .modal { border-radius: 24px; max-height: 92vh; }
      .modal-header { padding: 26px 22px 20px; border-radius: 24px 24px 0 0; }
      .modal-name { font-size: 1.6rem; }
      .modal-body { padding: 22px 22px 28px; }
    }

    /* ── FADE-IN ANIMATION ──────────────────────────────── */

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .recipe-card {
      animation: fadeUp 0.4s ease both;
    }

    .recipe-card:nth-child(1) { animation-delay: 0.04s; }
    .recipe-card:nth-child(2) { animation-delay: 0.08s; }
    .recipe-card:nth-child(3) { animation-delay: 0.12s; }
    .recipe-card:nth-child(4) { animation-delay: 0.16s; }
    .recipe-card:nth-child(5) { animation-delay: 0.20s; }
    .recipe-card:nth-child(6) { animation-delay: 0.24s; }
    .recipe-card:nth-child(n+7) { animation-delay: 0.28s; }
  </style>
</head>
<body>

<!-- Background -->
<div class="bg-stage">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="orb orb-4"></div>
  <div class="orb orb-5"></div>
</div>

<!-- Header -->
<header>
  <div class="header-inner">
    <div class="logo" id="logo">🌿 <span class="accent">Naše</span> recepty</div>
    <div class="lang-toggle">
      <button id="btn-cs" class="active" onclick="setLang('cs')">CZ</button>
      <button id="btn-en" onclick="setLang('en')">EN</button>
    </div>
  </div>
</header>

<!-- Main -->
<main class="container z1">

  <!-- Hero -->
  <section class="hero">
    <div class="hero-label" id="hero-label">🥬 Ověřené recepty</div>
    <h1 id="hero-title"><em>Vegetariánské</em> recepty</h1>
    <p class="hero-sub" id="hero-sub">Naše oblíbená rodinná jídla z celého světa</p>
    <div class="search-wrap">
      <input type="text" id="search-input" placeholder="Hledat recept…" oninput="renderGrid()" autocomplete="off">
      <span class="search-icon">⌕</span>
    </div>
    <div class="count-badge" id="count-badge">
      <span id="count-num"></span>
      <span id="count-label">receptů</span>
    </div>
  </section>

  <!-- Filters -->
  <div class="filters" id="filters">
    <button class="filter-btn active"
      data-cs="Vše" data-en="All"
      onclick="setFilter('all',this)">Vše</button>
    <button class="filter-btn"
      data-cs="🇮🇳 Indická" data-en="🇮🇳 Indian"
      onclick="setFilter('indian',this)">🇮🇳 Indická</button>
    <button class="filter-btn"
      data-cs="🇪🇺 Evropská" data-en="🇪🇺 European"
      onclick="setFilter('european',this)">🇪🇺 Evropská</button>
    <button class="filter-btn"
      data-cs="🍮 Dezerty" data-en="🍮 Desserts"

/* ── LANGUAGE ──────────────────────────────────────────────────────────────── */

function setLang(l) {
  lang = l;
  document.getElementById('btn-cs').classList.toggle('active', l === 'cs');
  document.getElementById('btn-en').classList.toggle('active', l === 'en');
  document.getElementById('hero-label').textContent = t[l].heroLabel;
  document.getElementById('hero-title').innerHTML = t[l].heroTitle;
  document.getElementById('hero-sub').textContent = t[l].heroSub;
  document.getElementById('search-input').placeholder = t[l].searchPlaceholder;
  document.getElementById('logo').innerHTML = t[l].logoText;
  document.getElementById('footer-text').textContent = t[l].footerText;
  document.getElementById('count-label').textContent = t[l].countLabel;
  // Update filter buttons
  const btns = document.querySelectorAll('.filter-btn');
  btns.forEach((btn, i) => { btn.textContent = t[l].filterLabels[i]; });
  renderGrid();
}

/* ── FILTER ────────────────────────────────────────────────────────────────── */

function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

/* ── GRID ──────────────────────────────────────────────────────────────────── */

function renderGrid() {
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  const grid = document.getElementById('grid');

  const filtered = recipes.filter(r => {
    const matchF = activeFilter === 'all' || r.cat === activeFilter;
    const matchQ = !q ||
      r.name.cs.toLowerCase().includes(q) ||
      r.name.en.toLowerCase().includes(q) ||
      r.desc.cs.toLowerCase().includes(q) ||
      r.desc.en.toLowerCase().includes(q) ||
      r.catLabel.cs.toLowerCase().includes(q) ||
      r.catLabel.en.toLowerCase().includes(q);
    return matchF && matchQ;
  });

  document.getElementById('count-num').textContent = filtered.length;

  if (!filtered.length) {
    grid.innerHTML = `<div class="no-results"><div class="nr-icon">🔍</div>${t[lang].noResults}</div>`;
    return;
  }

  grid.innerHTML = filtered.map((r, i) => `
    <article class="recipe-card" onclick="openModal(${r.id})" role="button" tabindex="0"
      onkeydown="if(event.key==='Enter')openModal(${r.id})"
      style="animation-delay:${Math.min(i,6)*0.04}s">
      <span class="card-emoji">${r.emoji}</span>
      <div class="card-cat">${r.catLabel[lang]}</div>
      <div class="card-name">${r.name[lang]}</div>
      <div class="card-desc">${r.desc[lang]}</div>
      <div class="card-meta">
        <span>${t[lang].time} ${r.time}</span>
        <span>◎ ${r.diff[lang]}</span>
      </div>
    </article>
  `).join('');
}

/* ── MODAL ─────────────────────────────────────────────────────────────────── */

function openModal(id) {
  const r = recipes.find(x => x.id === id);
  if (!r) return;

  document.getElementById('m-emoji').textContent = r.emoji;
  document.getElementById('m-cat').textContent = r.catLabel[lang];
  document.getElementById('m-name').textContent = r.name[lang];
  document.getElementById('m-desc').textContent = r.desc[lang];
  document.getElementById('m-meta').innerHTML = `
    <span>${t[lang].time} ${r.time}</span>
    <span style="margin-left:4px">◎ ${r.diff[lang]}</span>
  `;

  // Build ingredients
  let html = `<div class="section-title">${t[lang].ingredients}</div>`;
  const ings = r.ing[lang] || r.ing.cs;
  ings.forEach(sec => {
    if (sec.sub) html += `<div class="sub-label">${sec.sub}</div>`;
    html += `<ul class="ing-list">` + sec.items.map(i => `<li><span class="ing-dot"></span>${i}</li>`).join('') + `</ul>`;
  });

  // Build steps
  html += `<div class="section-title">${t[lang].steps}</div>`;
  html += `<ol class="steps-list">`;
  const steps = r.steps[lang] || r.steps.cs;
  steps.forEach((s, i) => {
    html += `<li><span class="step-num">${i + 1}</span><span>${s}</span></li>`;
  });
  html += `</ol>`;

  // Tip
  if (r.tip) {
    const tipTxt = (r.tip[lang] || r.tip.cs);
    html += `<div class="section-title">${t[lang].tip}</div><div class="tip-box">${tipTxt}</div>`;
  }

  document.getElementById('m-body').innerHTML = html;

  const overlay = document.getElementById('modal-overlay');
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
  // Scroll modal to top
  document.getElementById('modal').scrollTop = 0;
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

/* ── INIT ──────────────────────────────────────────────────────────────────── */

renderGrid();
</script>
